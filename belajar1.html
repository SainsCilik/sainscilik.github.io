<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sains Cilik - Kuiz Interaktif</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #fff9c4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 420px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
            box-sizing: border-box;
        }

        /* Top Bar Markah */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            background: #ede7f6;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            color: #5e35b1;
            margin-bottom: 20px;
        }

        h1 { color: #ff5722; text-align: center; font-size: 1.6rem; margin: 10px 0; }
        
        /* Kotak Soalan */
        .kuiz-box {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .option-btn {
            display: block;
            width: 100%;
            background-color: white;
            border: 3px solid #e0e0e0;
            padding: 14px;
            margin: 8px 0;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            font-weight: bold;
            box-shadow: 0 4px 0 #e0e0e0;
        }

        .option-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #e0e0e0;
        }

        /* Butang Aksi */
        .action-btn {
            width: 100%;
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 5px 0 #0b7dda;
            cursor: pointer;
            margin-top: 20px;
            display: none; /* Sembunyi dulu, keluar lepas pilih jawapan */
        }

        #result-message {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
        }

        .back-btn {
            text-align: center;
            display: block;
            background-color: #757575;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <!-- Header Kuiz -->
        <div class="quiz-header">
            <span id="progress-text">Soalan: 1/3</span>
            <span id="score-text">⭐ Markah: 0</span>
        </div>

        <h1>Cabaran Benda Hidup 🧬</h1>
        
        <!-- Kotak Kuiz Dinamik -->
        <div class="kuiz-box" id="quiz-area">
            <div class="question-text" id="question">Memuatkan soalan...</div>
            <div id="options-container"></div>
            <div id="result-message"></div>
            <button class="action-btn" id="next-btn" onclick="keSoalanSeterusnya()">SETERUSNYA ➡️</button>
        </div>

        <a href="tahun1.html" class="back-btn">⬅️ Keluar Kuiz</a>
    </div>

    <script>
        // Bank Soalan (Boleh tambah lagi di sini nanti)
        const soalanSains = [
            {
                q: "Antara berikut, yang manakah merupakan BENDA HIDUP?",
                options: ["🪨 Batu Jalan", "🐱 Kucing Comel", "🧸 Anak Patung"],
                correct: 1
            },
            {
                q: "Kenapa pokok bunga dianggap sebagai benda hidup?",
                options: ["Sebab ia berwarna-warni", "Sebab ia memerlukan air & membesar", "Sebab ia boleh berjalan"],
                correct: 1
            },
            {
                q: "Manakah antara berikut BENDA BUKAN HIDUP yang boleh bergerak sendiri?",
                options: ["🚗 Kereta", "🌳 Pokok Kelapa", "🐦 Burung Pipit"],
                correct: 0
            }
        ];

        let soalanSekarang = 0;
        let markah = 0;
        let jawapanDipilih = null;

        function paparSoalan() {
            jawapanDipilih = null;
            document.getElementById("result-message").innerText = "";
            document.getElementById("next-btn").style.display = "none";
            
            let data = soalanSains[soalanSekarang];
            document.getElementById("progress-text").innerText = `Soalan: ${soalanSekarang + 1}/${soalanSains.length}`;
            document.getElementById("question").innerText = data.q;
            
            let container = document.getElementById("options-container");
            container.innerHTML = "";
            
            data.options.forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => pilihJawapan(index, btn);
                container.appendChild(btn);
            });
        }

        function pilihJawapan(index, element) {
            if (jawapanDipilih !== null) return; // Kunci jawapan
            
            jawapanDipilih = index;
            let data = soalanSains[soalanSekarang];
            let msg = document.getElementById("result-message");
            let buttons = document.querySelectorAll(".option-btn");
            
            if (index === data.correct) {
                element.style.backgroundColor = "#c8e6c9"; // Hijau
                element.style.borderColor = "#4caf50";
                msg.innerText = "🎉 BETUL! Hebatlah kamu! 🌟";
                msg.style.color = "#2e7d32";
                markah += 10;
                document.getElementById("score-text").innerText = `⭐ Markah: ${markah}`;
            } else {
                element.style.backgroundColor = "#ffcdd2"; // Merah
                element.style.borderColor = "#f44336";
                buttons[data.correct].style.backgroundColor = "#c8e6c9"; // Tunjuk yang betul
                buttons[data.correct].style.borderColor = "#4caf50";
                msg.innerText = "❌ Alahai, salah... Cuba lagi!";
                msg.style.color = "#c62828";
            }
            
            // Keluarkan butang "SETERUSNYA" lepas klik jawapan
            document.getElementById("next-btn").style.display = "block";
        }

        function keSoalanSeterusnya() {
            soalanSekarang++;
            if (soalanSekarang < soalanSains.length) {
                paparSoalan();
            } else {
                // Skrin Keputusan Akhir
                document.getElementById("quiz-area").innerHTML = `
                    <div style="text-align:center; padding:30px 10px;">
                        <span style="font-size:4rem;">🏆</span>
                        <h3 style="color:#4caf50; font-size:1.5rem; margin:15px 0 5px 0;">KUIZ TAMAT!</h3>
                        <p style="font-size:1.1rem; font-weight:bold;">Kamu berjaya mengumpul <br><span style="color:#ff9800; font-size:1.6rem;">⭐ ${markah} Bintang!</span></p>
                        <p>Hebatlah bakal saintis kita ni! 😍</p>
                    </div>
                `;
            }
        }

        paparSoalan();
    </script>
</body>
</html>
