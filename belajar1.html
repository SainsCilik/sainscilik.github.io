<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sains Cilik Tahun 2 - Kuiz Latihan 1</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #fff3e0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 420px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
            box-sizing: border-box;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            background: #ffe0b2;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            color: #e65100;
            margin-bottom: 20px;
        }

        .hearts { color: #ff5252; font-size: 1.2rem; }

        h1 { color: #ff9800; text-align: center; font-size: 1.6rem; margin: 10px 0; }
        
        .kuiz-box {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .input-group {
            margin: 15px 0;
            text-align: left;
        }

        .input-group label {
            font-weight: bold;
            color: #e65100;
            display: block;
            margin-bottom: 8px;
        }

        .name-input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ff9800;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .instruction-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }
        
        .instruction-box {
            background: #fff3e0;
            border-left: 5px solid #ff9800;
            padding: 15px;
            text-align: left;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.5;
        }

        .option-btn {
            display: block;
            width: 100%;
            background-color: white;
            border: 3px solid #e0e0e0;
            padding: 14px;
            margin: 8px 0;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            font-weight: bold;
            box-shadow: 0 4px 0 #e0e0e0;
        }

        .action-btn {
            width: 100%;
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 5px 0 #e65100;
            cursor: pointer;
            margin-top: auto;
        }

        .report-btn {
            background-color: #0288d1;
            box-shadow: 0 5px 0 #01579b;
            margin-top: 10px;
        }

        .stats-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #b3e5fc;
            text-align: left;
            font-size: 0.95rem;
        }

        .stats-line {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            border-bottom: 1px dashed #e0e0e0;
            padding-bottom: 4px;
        }

        #result-message {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
        }

        .back-btn {
            text-align: center;
            display: block;
            background-color: #757575;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="quiz-header" id="header-bar" style="display: none;">
            <span id="progress-text">Soalan: 1/10</span>
            <span class="hearts" id="hearts-layer">❤️ ❤️ ❤️</span>
            <span id="score-text">Markah: 0</span>
        </div>

        <h1 id="main-title">Latihan Sains TAHUN 2 🎯</h1>
        <div id="paparNama" style="text-align:center; font-weight:bold; color:#e65100; margin-bottom:15px; font-size:1.1rem; display:none;"></div>
        
        <div class="kuiz-box" id="quiz-area">
            <!-- Skrin Utama -->
            <div class="instruction-screen" id="main-screen">
                <div>
                    <span style="font-size: 4rem;">🧪</span>
                    <h2 style="color: #e65100; margin-top: 5px;">Profil Profil Saintis</h2>
                    
                    <div class="input-group">
                        <label>Nama Murid:</label>
                        <input type="text" id="username" class="name-input" placeholder="Masukkan nama..." autocomplete="off">
                    </div>

                    <div class="instruction-box">
                        🎯 Selesaikan <b>10 soalan</b> asas silibus Sains Tahun 2.<br>
                        💯 Setiap jawapan betul memberikan <b>10 markah</b>.<br>
                        ❤️ Anda mempunyai <b>3 nyawa</b> sahaja. Berhati-hati menjawab!
                    </div>
                </div>
                <div>
                    <button class="action-btn" onclick="mulaKuiz()">🚀 MULA BELAJAR</button>
                    <button class="action-btn report-btn" onclick="paparSistemPrestasi()">📊 REKOD PRESTASI (IBU BAPA)</button>
                </div>
            </div>
        </div>

        <a href="tahun2.html" class="back-btn">⬅️ Keluar</a>
    </div>

    <script>
        const bankSoalan = [
            { q: "Antara berikut, yang manakah merupakan keperluan asas manusia? 🍱", options: ["📱 Telefon pintar", "🍱 Makanan, air dan udara", "🧸 Mainan"], correct: 1 },
            { q: "Mengapakah manusia memerlukan udara? 💨", options: ["🏃 Untuk bernafas", "📈 Untuk membesar", "🚶 Untuk berjalan"], correct: 0 },
            { q: "Apakah yang berlaku kepada saiz badan kita apabila kita membesar? 👨‍🦱", options: ["📉 Menjadi kecil", "📈 Menjadi besar", "❌ Tidak berubah"], correct: 1 },
            { q: "Tumbesaran manusia melibatkan pertambahan saiz, berat dan... 📐", options: ["🏃 Kepantasan", "📐 Tinggi", "🧥 Warna baju"], correct: 1 },
            { q: "Ciri-ciri fizikal seperti warna anak mata diwarisi daripada... 👪", options: ["🏫 Guru", "👪 Ibu bapa atau keturunan", "🎨 Kawan-kawan"], correct: 1 },
            { q: "Haiwan manakah yang menyusukan anaknya? 🐈", options: ["🐔 Ayam", "🐋 Paus atau Kucing", "🐸 Katak"], correct: 1 },
            { q: "Manakah antara haiwan berikut bertelur dengan banyak? 🐸", options: ["🐢 Tenggiling", "🐸 Katak atau Penyu", "🐒 Monyet"], correct: 1 },
            { q: "Apakah keperluan asas bagi anak benih untuk bercambah? 🌱", options: ["🧪 Baja, tanah dan pasu", "💧 Air, udara dan kehangatan", "☀️ Cahaya matahari sahaja"], correct: 1 },
            { q: "Apakah sumber cahaya semula jadi yang utama pada waktu siang? ☀️", options: ["💡 Mentol", "🔥 Lilin", "☀️ Matahari"], correct: 2 },
            { q: "Bilakah bayang-bayang terbentuk? 👤", options: ["👤 Apabila cahaya dihalang oleh objek", "💡 Apabila lampu ditutup", "🌙 Waktu malam sahaja"], correct: 0 }
        ];

        let kuizSoalan = [];
        let soalanSekarang = 0;
        let markah = 0;
        let nyawa = 3;
        let jawapanDipilih = null;
        const JUMLAH_SOALAN = 10;

        let namaDisimpan = localStorage.getItem('namaMurid') || "";
        if (namaDisimpan) {
            document.getElementById('username').value = namaDisimpan;
        }

        function kemaskiniNyawa() {
            let hStr = "";
            for (let i = 0; i < nyawa; i++) hStr += "❤️ ";
            if (nyawa === 0) hStr = "💔 Game Over";
            document.getElementById("hearts-layer").innerText = hStr ? hStr.trim() : "💔";
        }

        function mulaKuiz() {
            let inputNama = document.getElementById("username").value.trim();
            let namaFinal = inputNama ? inputNama : "SAINTIS CILIK";
            
            localStorage.setItem('namaMurid', namaFinal);

            let elemenNama = document.getElementById('paparNama');
            elemenNama.innerHTML = `🧪 Saintis: <span style="color:#e65100">${namaFinal.toUpperCase()}</span>`;
            elemenNama.style.display = "block";

            document.getElementById("main-screen").style.display = "none";
            document.getElementById("header-bar").style.display = "flex";
            
            kuizSoalan = bankSoalan.sort(() => 0.5 - Math.random());
            
            soalanSekarang = 0;
            markah = 0;
            nyawa = 3;
            kemaskiniNyawa();
            paparSoalan();
        }

        function paparSoalan() {
            jawapanDipilih = null;
            let quizArea = document.getElementById("quiz-area");
            let data = kuizSoalan[soalanSekarang];
            document.getElementById("progress-text").innerText = `Soalan: ${soalanSekarang + 1}/${JUMLAH_SOALAN}`;
            
            quizArea.innerHTML = `
                <div class="question-text">${data.q}</div>
                <div id="options-container"></div>
                <div id="result-message"></div>
                <button class="action-btn" id="next-btn" style="display:none;" onclick="keSoalanSeterusnya()">SETERUSNYA ➡️</button>
            `;
            
            let container = document.getElementById("options-container");
            data.options.forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => pilihJawapan(index, btn);
                container.appendChild(btn);
            });
        }

        function pilihJawapan(index, element) {
            if (jawapanDipilih !== null) return;
            
            jawapanDipilih = index;
            let data = kuizSoalan[soalanSekarang];
            let msg = document.getElementById("result-message");
            let buttons = document.querySelectorAll(".option-btn");
            
            if (index === data.correct) {
                element.style.backgroundColor = "#c8e6c9";
                element.style.borderColor = "#4caf50";
                msg.innerText = "🎉 BETUL! (+10 Markah) 🌟";
                msg.style.color = "#2e7d32";
                markah += 10;
                document.getElementById("score-text").innerText = `Markah: ${markah}`;
            } else {
                element.style.backgroundColor = "#ffcdd2";
                element.style.borderColor = "#f44336";
                buttons[data.correct].style.backgroundColor = "#c8e6c9";
                buttons[data.correct].style.borderColor = "#4caf50";
                msg.innerText = "❌ SALAH! Jawapan betul warna hijau. 😉";
                msg.style.color = "#c62828";
                nyawa--;
                kemaskiniNyawa();
            }
            document.getElementById("next-btn").style.display = "block";
        }

        function keSoalanSeterusnya() {
            if (nyawa <= 0) {
                tamatKuiz(true);
                return;
            }
            
            soalanSekarang++;
            if (soalanSekarang < JUMLAH_SOALAN) {
                paparSoalan();
            } else {
                tamatKuiz(false);
            }
        }

        function tamatKuiz(isGameOver) {
            document.getElementById("header-bar").style.display = "none";
            let quizArea = document.getElementById("quiz-area");
            
            let totalMain = parseInt(localStorage.getItem('sains_kuiz1_total_main') || "0") + 1;
            let markahTertinggi = parseInt(localStorage.getItem('sains_kuiz1_high_score') || "0");
            if (markah > markahTertinggi) {
                localStorage.setItem('sains_kuiz1_high_score', markah);
            }
            localStorage.setItem('sains_kuiz1_total_main', totalMain);
            localStorage.setItem('sains_kuiz1_last_date', new Date().toLocaleDateString('ms-MY'));

            if (isGameOver) {
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">💥</span>
                        <h3 style="color:#c62828; margin:10px 0;">GAME OVER!</h3>
                        <p>Nyawa anda telah habis. Jangan putus asa, cuba lagi! 💪</p>
                        <p style="font-size:1.1rem; font-weight:bold;">Markah Terkumpul: <span style="color:#c62828;">${markah}</span></p>
                        <button onclick="location.reload()" class="action-btn">🔄 CUBA LAGI</button>
                    </div>
                `;
            } else {
                let piala = markah >= 80 ? "🏆" : "🥈";
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">${piala}</span>
                        <h3 style="color:#4caf50; margin:10px 0;">TAHNIAH KUIZ TAMAT!</h3>
                        <p style="font-size:1.1rem; font-weight:bold;">Markah Latihan 1:<br><span style="color:#4caf50; font-size:2.5rem;">💯 ${markah}/100</span></p>
                        <button onclick="location.reload()" class="action-btn">🔄 MAIN LAGI</button>
                    </div>
                `;
            }
        }

        function paparSistemPrestasi() {
            let quizArea = document.getElementById("quiz-area");
            let namaAnak = localStorage.getItem('namaMurid') || "Belum Letak Nama";
            let hScore = localStorage.getItem('sains_kuiz1_high_score') || "0";
            let tMain = localStorage.getItem('sains_kuiz1_total_main') || "0";
            let lDate = localStorage.getItem('sains_kuiz1_last_date') || "Tiada Rekod";
            
            let gred = "U (Perlu Latihan)";
            if(hScore >= 80) gred = "A (Cemerlang) 🌟";
            else if(hScore >= 60) gred = "B (Bagus) 👍";
            else if(hScore >= 40) gred = "C (Lulus) 👌";

            quizArea.innerHTML = `
                <div class="instruction-screen">
                    <div>
                        <span style="font-size: 3rem;">📊</span>
                        <h3 style="color: #0288d1; margin: 5px 0;">Dashboard Ibu Bapa (Kuiz 1)</h3>
                        <p style="font-size:0.85rem; color:#666; margin-bottom:10px;">Semak perkembangan kuiz pengenalan anak anda.</p>
                        
                        <div class="stats-card">
                            <div class="stats-line"><b>Nama Anak:</b> <span>${namaAnak.toUpperCase()}</span></div>
                            <div class="stats-line"><b>Markah Tertinggi:</b> <span style="color:#4caf50; font-weight:bold;">${hScore}/100</span></div>
                            <div class="stats-line"><b>Gred Terbaik:</b> <span>${gred}</span></div>
                            <div class="stats-line"><b>Jumlah Latihan:</b> <span>${tMain} Kali</span></div>
                            <div class="stats-line"><b>Ujian Terakhir:</b> <span>${lDate}</span></div>
                        </div>
                    </div>
                    <button class="action-btn" style="background-color:#757575; box-shadow:0 5px 0 #424242;" onclick="location.reload()">⬅️ KEMBALI</button>
                </div>
            `;
        }
    </script>
</body>
</html>
