<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sains Cilik Tahun 1 - Kuiz Latihan 1</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #fff3e0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 420px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
            box-sizing: border-box;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            background: #ffe0b2;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            color: #e65100;
            margin-bottom: 20px;
        }

        .hearts { color: #ff5252; font-size: 1.2rem; }

        h1 { color: #ff9800; text-align: center; font-size: 1.6rem; margin: 10px 0; }
        
        .kuiz-box {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .input-group {
            margin: 15px 0;
            text-align: left;
        }

        .input-group label {
            font-weight: bold;
            color: #e65100;
            display: block;
            margin-bottom: 8px;
        }

        .name-input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ff9800;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .instruction-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }
        
        .instruction-box {
            background: #fff3e0;
            border-left: 5px solid #ff9800;
            padding: 15px;
            text-align: left;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.5;
        }

        .option-btn {
            display: block;
            width: 100%;
            background-color: white;
            border: 3px solid #e0e0e0;
            padding: 14px;
            margin: 8px 0;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            font-weight: bold;
            box-shadow: 0 4px 0 #e0e0e0;
        }

        .action-btn {
            width: 100%;
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 5px 0 #e65100;
            cursor: pointer;
            margin-top: auto;
        }

        .report-btn {
            background-color: #0288d1;
            box-shadow: 0 5px 0 #01579b;
            margin-top: 10px;
        }

        .stats-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #b3e5fc;
            text-align: left;
            font-size: 0.95rem;
        }

        .stats-line {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            border-bottom: 1px dashed #e0e0e0;
            padding-bottom: 4px;
        }

        #result-message {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
        }

        .back-btn {
            text-align: center;
            display: block;
            background-color: #757575;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="quiz-header" id="header-bar" style="display: none;">
            <span id="progress-text">Soalan: 1/20</span>
            <span class="hearts" id="hearts-layer">❤️ ❤️ ❤️</span>
            <span id="score-text">Markah: 0</span>
        </div>

        <h1 id="main-title">Latihan Sains TAHUN 1 🎯</h1>
        <div id="paparNama" style="text-align:center; font-weight:bold; color:#e65100; margin-bottom:15px; font-size:1.1rem; display:none;"></div>
        
        <div class="kuiz-box" id="quiz-area">
            <!-- Skrin Utama -->
            <div class="instruction-screen" id="main-screen">
                <div>
                    <span style="font-size: 4rem;">🧪</span>
                    <h2 style="color: #e65100; margin-top: 5px;">Profil Saintis</h2>
                    
                    <div class="input-group">
                        <label>Nama Murid:</label>
                        <input type="text" id="username" class="name-input" placeholder="Masukkan nama..." autocomplete="off">
                    </div>

                    <div class="instruction-box">
                        🎯 Selesaikan <b>20 soalan</b> rawak daripada bank soalan.<br>
                        💯 Setiap jawapan betul memberikan <b>5 markah</b> (Maksimum 100).<br>
                        ❤️ Anda mempunyai <b>3 nyawa</b> sahaja. Berhati-hati menjawab!
                    </div>
                </div>
                <div>
                    <button class="action-btn" onclick="mulaKuiz()">🚀 MULA BELAJAR</button>
                    <button class="action-btn report-btn" onclick="paparSistemPrestasi()">📊 REKOD PRESTASI (IBU BAPA)</button>
                </div>
            </div>
        </div>

        <a href="tahun1.html" class="back-btn">⬅️ Keluar</a>
    </div>

    <script>
        // BANK 50 SOALAN TAHUN 1 MUTLAK Bersih & Padat
        const bankSoalan = [
            { q: "Antara berikut, yang manakah benda hidup? 🐈", options: ["🧸 Anak patung", "🐈 Kucing", "🚗 Kereta mainan"], correct: 1 },
            { q: "Apakah keperluan asas benda hidup untuk bernafas? 💨", options: ["💨 Udara", "🍔 Makanan", "🏠 Rumah"], correct: 0 },
            { q: "Manakah benda bukan hidup yang boleh bergerak menggunakan bateri? 🤖", options: ["🐦 Burung", "🤖 Robot mainan", "🐠 Ikan"], correct: 1 },
            { q: "Apakah deria yang digunakan untuk mendengar lagu? 👂", options: ["👁️ Penglihatan", "👂 Pendengaran", "👅 Rasa"], correct: 1 },
            { q: "Kita menggunakan deria bau melalui anggota badan... 👃", options: ["👃 Hidung", "👁️ Mata", "✋ Tangan"], correct: 0 },
            { q: "Apakah rasa buah lemon? 🍋", options: ["🍬 Manis", "🧂 Masin", "🍋 Masam"], correct: 2 },
            { q: "Bahagian tumbuhan manakah yang menyerap air dari tanah? 🪵", options: ["🍃 Daun", "🌺 Bunga", "🪵 Akar"], correct: 2 },
            { q: "Apakah tindakan magnet apabila dua kutub yang SAMA didekatkan? 🧲", options: ["🤝 Menarik", "🛑 Menolak", "❌ Tiada apa-apa"], correct: 1 },
            { q: "Objek manakah yang boleh ditarik oleh magnet? 📎", options: ["📎 Klip kertas logam", "✏️ Pemadam", "🪵 Pembaris kayu"], correct: 0 },
            { q: "Antara bahan berikut, yang manakah boleh menyerap air? 🧻", options: ["🥤 Gelas plastik", "🧻 Tuala kertas", "🪙 Syiling besi"], correct: 1 },
            { q: "Mengapakah kita guna payung semasa hujan? 🌧️", options: ["🧱 Guna payung kalis air", "🧻 Guna payung serap air", "🌱 Biar payung membesar"], correct: 0 },
            { q: "Pokok memerlukan apa untuk membuat makanannya sendiri? ☀️", options: ["☀️ Cahaya matahari", "🥛 Susu", "🥩 Daging"], correct: 0 },
            { q: "Antara berikut, yang manakah haiwan berkaki dua? 🐔", options: ["🐈 Kucing", "🐔 Ayam", "Lembu"], correct: 1 },
            { q: "Apakah fungsi bunga pada sesetengah tumbuhan? 🌺", options: ["🌺 Menjadi buah dan biji benih", "🏃 Berjalan", "💨 Bernafas"], correct: 0 },
            { q: "Deria rasa berada di anggota badan yang mana? 👅", options: ["👃 Hidung", "👅 Lidah", "✋ Kulit"], correct: 1 },
            { q: "Objek manakah yang KALIS AIR? 🪵", options: ["🧻 Tisu", "👕 Baju kain", "🥾 Boot getah"], correct: 2 },
            { q: "Haiwan manakah yang hidup di dalam air? 🐠", options: ["🐠 Ikan", "🐕 Anjing", "🐈 Kucing"], correct: 0 },
            { q: "Apakah bentuk bumi yang tinggi dan curam? ⛰️", options: ["⛰️ Gunung", "🌾 Sawah padi", "🏖️ Pantai"], correct: 0 },
            { q: "Bahan manakah yang sesuai untuk mengelap air yang tumpah? 🧽", options: ["塑料 Beg plastik", "🧽 Kain tuala", "Kertas pasir"], correct: 1 },
            { q: "Apakah yang akan berlaku jika benda hidup tidak mendapat air? 💀", options: ["📈 Membesar cepat", "💀 Boleh mati", "🏃 Menjadi kuat"], correct: 1 },
            { q: "Cermin mata digunakan untuk membantu deria apa? 👁️", options: ["👁️ Deria penglihatan", "👂 Deria pendengaran", "👃 Deria bau"], correct: 0 },
            { q: "Antara tumbuhan berikut, yang manakah mempunyai duri? 🌵", options: ["🌱 Pokok pisang", "🌵 Pokok kaktus", "🌱 Pokok keembung"], correct: 1 },
            { q: "Apakah kegunaan utama batu baur dalam pembinaan? 🧱", options: ["🍔 Makanan", "🧱 Membuat bangunan/jalan", "👕 Pakaian"], correct: 1 },
            { q: "Bentuk asas bagi sebiji bola ialah... ⚽", options: ["📐 Segi tiga", "🟪 Segi empat", "🟢 Sfera / Bulat"], correct: 2 },
            { q: "Magnet mempunyai berapa kutub? 🧲", options: ["1 Kutub", "2 Kutub (Utara & Selatan)", "4 Kutub"], correct: 1 },
            { q: "Apakah deria yang terjejas jika kita selsema? 👃", options: ["👁️ Penglihatan", "👂 Pendengaran", "👃 Bau"], correct: 2 },
            { q: "Benda bukan hidup tidak memerlukan... 🍱", options: ["🍱 Makanan dan air", "Bateri", "❌ Tiada apa-apa"], correct: 0 },
            { q: "Apakah bahagian pokok yang memegang pokok pada tanah? 🪵", options: ["🪵 Akar", "🌺 Bunga", "🍃 Daun"], correct: 0 },
            { q: "Antara haiwan berikut, yang manakah terbang di udara? 🦋", options: ["🐍 Ular", "🦋 Kupu-kupu", "🐕 Kucing"], correct: 1 },
            { q: "Gula memberikan rasa apa pada lidah? 🍬", options: ["🍋 Masam", "🍬 Manis", "☕ Pahit"], correct: 1 },
            { q: "Ubat pahit dikesan oleh deria apa? 👅", options: ["👅 Deria rasa", "👃 Deria bau", "👁️ Deria lihat"], correct: 0 },
            { q: "Objek manakah yang diperbuat daripada plastik dan kalis air? 📐", options: ["👕 Sapu tangan", "📐 Pembaris plastik", "🧻 Kadbod"], correct: 1 },
            { q: "Apakah bahagian badan burung untuk terbang? 🦅", options: ["🦿 Kaki", "🦅 Sayap", "👄 Paruh"], correct: 1 },
            { q: "Pokok semalu akan buat apa jika disentuh? 🌿", options: ["🌿 Daunnya menguncup", "📈 Berubah warna", "💀 Terus mati"], correct: 0 },
            { q: "Antara berikut, tanah manakah yang mengandungi banyak batu pasir? 🏜️", options: ["🌱 Tanah kebun", "🏜️ Tanah pasir", "Tanah liat"], correct: 1 },
            { q: "Tanah liat sangat sesuai untuk menanam... 🌾", options: ["🌵 Kaktus", "🌾 Padi", "🌱 Pokok jagung"], correct: 1 },
            { q: "Apakah nama objek berbentuk U atau bar yang boleh menarik besi? 🧲", options: ["🧲 Magnet", "✏️ Pensel", "🔑 Pemutar skru"], correct: 0 },
            { q: "Mengapakah cacing tanah suka duduk di dalam tanah kebun? 🌱", options: ["🌱 Banyak nutrien/makanan", "🥵 Cuaca panas", "❌ Saja-saja"], correct: 0 },
            { q: "Susu lembu segar memberikan rasa... 🥛", options: [" Masam", "🥛 Lemak / Manis", "☕ Pahit"], correct: 1 },
            { q: "Haiwan manakah yang tidak mempunyai kaki? 🐍", options: ["🐸 Katak", "🐍 Ular", "🦆 Itik"], correct: 1 },
            { q: "Apakah deria yang digunakan untuk tahu permukaan meja kasar? ✋", options: ["👃 Bau", "👂 Dengar", "✋ Sentuhan"], correct: 2 },
            { q: "Antara benda berikut, yang manakah akan tenggelam dalam air? 🪙", options: ["🍃 Daun kering", "🪙 Duit syiling logam", "🪵 Pembaris kayu"], correct: 1 },
            { q: "Pokok bunga mawar melindungi diri dengan... 🌹", options: ["🍂 Bau busuk", "🌹 Duri tajam", "🥛 Getah"], correct: 1 },
            { q: "Bunyi guruh yang kuat dikesan oleh deria... 👂", options: ["👂 Pendengaran", "👁️ Penglihatan", "👅 Rasa"], correct: 0 },
            { q: "Kita memerlukan tempat perlindungan untuk... 🏠", options: ["🏃 Bermain", "🏠 Berlindung dari hujan & panas", "📈 Menjadi kaya"], correct: 1 },
            { q: "Benda hidup akan mengalami apa apabila masa berlalu? 📈", options: ["📉 Menjadi kecil", "📈 Tumbesaran/Membesar", "❌ Kekal sama"], correct: 1 },
            { q: "Ular digolongkan sebagai haiwan yang... 🐍", options: [" Fly", "🐍 Merangkak/Melata", "🏃 Berlari laju"], correct: 1 },
            { q: "Apakah komponen utama yang ada dalam tanah kebun? 🌱", options: ["🌱 Humus (reputan daun/haiwan)", "💎 Berlian", "🥤 Plastik"], correct: 0 },
            { q: "Klip kertas diperbuat daripada besi, jadi ia adalah objek... 📎", options: ["🧲 Magnetik", "❌ Bukan magnetik", " Kaca"], correct: 0 },
            { q: "Matahari terbit pada waktu... 🌅", options: ["🌙 Malam", "🌅 Pagi", " Petang"], correct: 1 }
        ];

        let kuizSoalan = [];
        let soalanSekarang = 0;
        let markah = 0;
        let nyawa = 3;
        let jawapanDipilih = null;
        const JUMLAH_SOALAN = 20; // Tetap 20 soalan wajib selesai!

        let namaDisimpan = localStorage.getItem('namaMurid') || "";
        if (namaDisimpan) {
            namaDisimpan = namaDisimpan.replace(/🤖/g, '').trim(); 
            document.getElementById('username').value = namaDisimpan;
        }

        function kemaskiniNyawa() {
            let hStr = "";
            for (let i = 0; i < nyawa; i++) hStr += "❤️ ";
            if (nyawa === 0) hStr = "💔 Game Over";
            document.getElementById("hearts-layer").innerText = hStr ? hStr.trim() : "💔";
        }

        function mulaKuiz() {
            let inputNama = document.getElementById("username").value.trim();
            let namaFinal = inputNama ? inputNama : "SAINTIS CILIK";
            
            namaFinal = namaFinal.replace(/🤖/g, '').trim();
            localStorage.setItem('namaMurid', namaFinal);

            let elemenNama = document.getElementById('paparNama');
            elemenNama.innerHTML = `🧪 Saintis: <span style="color:#e65100">${namaFinal.toUpperCase()}</span>`;
            elemenNama.style.display = "block";

            document.getElementById("main-screen").style.display = "none";
            document.getElementById("header-bar").style.display = "flex";
            
            // Rawak kan 50 soalan, pastu ambil 20 teratas sahaja!
            kuizSoalan = bankSoalan.sort(() => 0.5 - Math.random()).slice(0, JUMLAH_SOALAN);
            
            soalanSekarang = 0;
            markah = 0;
            nyawa = 3;
            kemaskiniNyawa();
            paparSoalan();
        }

        function paparSoalan() {
            jawapanDipilih = null;
            let quizArea = document.getElementById("quiz-area");
            let data = kuizSoalan[soalanSekarang];
            document.getElementById("progress-text").innerText = `Soalan: ${soalanSekarang + 1}/${JUMLAH_SOALAN}`;
            
            quizArea.innerHTML = `
                <div class="question-text">${data.q}</div>
                <div id="options-container"></div>
                <div id="result-message"></div>
                <button class="action-btn" id="next-btn" style="display:none;" onclick="keSoalanSeterusnya()">SETERUSNYA ➡️</button>
            `;
            
            let container = document.getElementById("options-container");
            data.options.forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => pilihJawapan(index, btn);
                container.appendChild(btn);
            });
        }

        function pilihJawapan(index, element) {
            if (jawapanDipilih !== null) return;
            
            jawapanDipilih = index;
            let data = kuizSoalan[soalanSekarang];
            let msg = document.getElementById("result-message");
            let buttons = document.querySelectorAll(".option-btn");
            
            if (index === data.correct) {
                element.style.backgroundColor = "#c8e6c9";
                element.style.borderColor = "#4caf50";
                msg.innerText = "🎉 BETUL! (+5 Markah) 🌟";
                msg.style.color = "#2e7d32";
                markah += 5; // 20 soalan * 5 markah = 100 markah penuh
                document.getElementById("score-text").innerText = `Markah: ${markah}`;
            } else {
                element.style.backgroundColor = "#ffcdd2";
                element.style.borderColor = "#f44336";
                buttons[data.correct].style.backgroundColor = "#c8e6c9";
                buttons[data.correct].style.borderColor = "#4caf50";
                msg.innerText = "❌ SALAH! Jawapan betul warna hijau. 😉";
                msg.style.color = "#c62828";
                nyawa--;
                kemaskiniNyawa();
            }
            document.getElementById("next-btn").style.display = "block";
        }

        function keSoalanSeterusnya() {
            if (nyawa <= 0) {
                tamatKuiz(true);
                return;
            }
            
            soalanSekarang++;
            if (soalanSekarang < JUMLAH_SOALAN) {
                paparSoalan();
            } else {
                tamatKuiz(false);
            }
        }

        function tamatKuiz(isGameOver) {
            document.getElementById("header-bar").style.display = "none";
            let quizArea = document.getElementById("quiz-area");
            
            let totalMain = parseInt(localStorage.getItem('sains_kuiz1_total_main') || "0") + 1;
            let markahTertinggi = parseInt(localStorage.getItem('sains_kuiz1_high_score') || "0");
            if (markah > markahTertinggi) {
                localStorage.setItem('sains_kuiz1_high_score', markah);
            }
            localStorage.setItem('sains_kuiz1_total_main', totalMain);
            localStorage.setItem('sains_kuiz1_last_date', new Date().toLocaleDateString('ms-MY'));

            if (isGameOver) {
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">💥</span>
                        <h3 style="color:#c62828; margin:10px 0;">GAME OVER!</h3>
                        <p>Nyawa anda telah habis. Jangan putus asa, cuba lagi! 💪</p>
                        <p style="font-size:1.1rem; font-weight:bold;">Markah Terkumpul: <span style="color:#c62828;">${markah}</span></p>
                        <button onclick="location.reload()" class="action-btn">🔄 CUBA LAGI</button>
                    </div>
                `;
            } else {
                let piala = markah >= 80 ? "🏆" : "🥈";
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">${piala}</span>
                        <h3 style="color:#4caf50; margin:10px 0;">TAHNIAH KUIZ TAMAT!</h3>
                        <p style="font-size:1.1rem; font-weight:bold;">Markah Latihan 1:<br><span style="color:#4caf50; font-size:2.5rem;">💯 ${markah}/100</span></p>
                        <button onclick="location.reload()" class="action-btn">🔄 MAIN LAGI</button>
                    </div>
                `;
            }
        }

        function paparSistemPrestasi() {
            let quizArea = document.getElementById("quiz-area");
            let namaAnak = localStorage.getItem('namaMurid') || "Belum Letak Nama";
            namaAnak = namaAnak.replace(/🤖/g, '').trim(); 
            let hScore = localStorage.getItem('sains_kuiz1_high_score') || "0";
            let tMain = localStorage.getItem('sains_kuiz1_total_main') || "0";
            let lDate = localStorage.getItem('sains_kuiz1_last_date') || "Tiada Rekod";
            
            let gred = "U (Perlu Latihan)";
            if(hScore >= 80) gred = "A (Cemerlang) 🌟";
            else if(hScore >= 60) gred = "B (Bagus) 👍";
            else if(hScore >= 40) gred = "C (Lulus) 👌";

            quizArea.innerHTML = `
                <div class="instruction-screen">
                    <div>
                        <span style="font-size: 3rem;">📊</span>
                        <h3 style="color: #0288d1; margin: 5px 0;">Dashboard Ibu Bapa (Kuiz 1)</h3>
                        <p style="font-size:0.85rem; color:#666; margin-bottom:10px;">Semak perkembangan kuiz pengenalan anak anda.</p>
                        
                        <div class="stats-card">
                            <div class="stats-line"><b>Nama Anak:</b> <span>${namaAnak.toUpperCase()}</span></div>
                            <div class="stats-line"><b>Markah Tertinggi:</b> <span style="color:#4caf50; font-weight:bold;">${hScore}/100</span></div>
                            <div class="stats-line"><b>Gred Terbaik:</b> <span>${gred}</span></div>
                            <div class="stats-line"><b>Jumlah Latihan:</b> <span>${tMain} Kali</span></div>
                            <div class="stats-line"><b>Ujian Terakhir:</b> <span>${lDate}</span></div>
                        </div>
                    </div>
                    <button class="action-btn" style="background-color:#757575; box-shadow:0 5px 0 #424242;" onclick="location.reload()">⬅️ KEMBALI</button>
                </div>
            `;
        }
    </script>
</body>
</html>
