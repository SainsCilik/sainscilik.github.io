<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sains Cilik Tahun 1 - Daftar Profil</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #e0f2f1;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 420px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .avatar-main {
            font-size: 5rem;
            margin-top: 40px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h2 {
            color: #004d40;
            font-size: 1.8rem;
            margin: 20px 0 10px 0;
            text-align: center;
        }

        p {
            color: #555;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .input-box {
            width: 100%;
            background: #f5f5f5;
            border: 2px solid #b2dfdb;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 30px;
            text-align: center;
        }

        label {
            display: block;
            font-weight: bold;
            color: #00796b;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 90%;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            font-family: 'Comic Sans MS', sans-serif;
        }

        .save-btn {
            width: 100%;
            background-color: #00cc66;
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 5px 0 #00994d;
            cursor: pointer;
        }

        .save-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #00994d;
        }

        .footer {
            margin-top: auto;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="avatar-main">🎒</div>
        <h2>Daftar Profil Baru</h2>
        <p>Masukkan namamu untuk memulakan pengembaraan Sains!</p>

        <div class="input-box">
            <label for="student-name">Nama Murid :</label>
            <input type="text" id="student-name" placeholder="TULIS NAMA DI SINI..." required>
        </div>

        <button class="save-btn" onclick="simpanProfil()">Simpan Profil</button>

        <div class="footer">
            BIJAK SAINS TAHUN 1 • KSSR MALAYSIA
        </div>
    </div>

    <script>
        function simpanProfil() {
            let nama = document.getElementById('student-name').value;
            if(nama.trim() === "") {
                alert("Sila tulis nama anda dahulu kawan! 😊");
            } else {
                localStorage.setItem('namaMurid', nama);
                window.location.href = "belajar1.html";
            }
        }
    </script>

</body>
</html>
