            border-radius: 20px; font-weight: bold; font-family: inherit; cursor: pointer;
            box-shadow: 0 3px 0 #ff8f00; transition: 0.2s;
        }
        .lang-btn:active { box-shadow: 0 0 0 #ff8f00; transform: translateY(3px); }

        /* Login & Menu Styles */
        .logo-icon { font-size: 3.5rem; text-align: center; margin-bottom: 5px; }

        p.subtitle { text-align: center; color: #555; font-size: 0.95rem; margin-bottom: 25px; }

        .input-label { font-weight: bold; color: #2e7d32; display: block; margin-bottom: 8px; font-size: 1.1rem; }
        
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .avatar-btn { background: white; border: 2px solid #ccc; border-radius: 12px; font-size: 2rem; padding: 10px 0; cursor: pointer; transition: 0.2s; }
        .avatar-btn.active { border-color: #4caf50; background: #c8e6c9; transform: scale(1.05); }

        .name-input {
            width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #4caf50;
            border-radius: 10px; box-sizing: border-box; font-family: inherit; margin-bottom: 20px;
            text-align: center; font-weight: bold;
        }

        .action-btn {
            width: 100%; background-color: #4caf50; color: white; border: none;
            padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 15px;
            box-shadow: 0 5px 0 #1b5e20; cursor: pointer; margin-bottom: 10px;
        }
        .action-btn:active { box-shadow: 0 0 0 #1b5e20; transform: translateY(5px); }

        .divider { text-align: center; font-weight: bold; color: #757575; font-size: 0.85rem; margin: 20px 0 10px 0; letter-spacing: 1px; }
        .existing-profile-btn {
            width: 100%; background: white; border: 2px dashed #4caf50; padding: 15px; border-radius: 15px; cursor: pointer;
            text-align: left; display: flex; justify-content: space-between; align-items: center; font-family: inherit; font-size: 1.1rem; transition: 0.2s;
        }
        .existing-profile-btn:hover { background: #e8f5e9; }
        .ep-left { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #1b5e20; }
        .ep-right { font-weight: bold; color: #ff8f00; background: #fff8e1; padding: 5px 10px; border-radius: 10px; }

        .menu-card { background: #e8f5e9; border: 3px solid #4caf50; border-radius: 15px; padding: 25px 20px; text-align: center; margin-bottom: 25px; }
        .menu-avatar { font-size: 4rem; margin-bottom: 10px; }
        .menu-name { font-size: 1.5rem; color: #1b5e20; font-weight: bold; margin-bottom: 5px; }
        .menu-stats { background: white; padding: 10px; border-radius: 10px; font-weight: bold; color: #ff8f00; margin-top: 15px; }
        .btn-keluar { background-color: #f44336; box-shadow: 0 5px 0 #b71c1c; }
        .btn-rekod { background-color: #0288d1; box-shadow: 0 5px 0 #01579b; }

        /* Quiz Styles */
        .quiz-header { display: flex; justify-content: space-between; background: #c8e6c9; padding: 10px 15px; border-radius: 12px; font-weight: bold; color: #1b5e20; margin-bottom: 20px; }
        .hearts { color: #ff5252; font-size: 1.2rem; }
        h1 { color: #2e7d32; text-align: center; font-size: 1.6rem; margin: 10px 0; }
        
        .kuiz-box { background-color: #f5f5f5; padding: 20px; border-radius: 20px; border: 2px solid #e0e0e0; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; margin-bottom: 15px; }
        .question-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; color: #333; line-height: 1.5; }
        .option-btn { display: block; width: 100%; background-color: white; border: 3px solid #e0e0e0; padding: 14px; margin: 8px 0; border-radius: 15px; font-size: 1rem; cursor: pointer; text-align: left; font-weight: bold; box-shadow: 0 4px 0 #e0e0e0; }
        #result-message { text-align: center; font-size: 1.2rem; font-weight: bold; margin-top: 15px; margin-bottom: 15px; }
        
        .back-btn { text-align: center; display: block; background-color: #757575; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; font-family: inherit; font-size: 1.1rem; width: 100%; }
        .instruction-screen { text-align: center; display: flex; flex-direction: column; height: 100%; justify-content: center; }
        .stats-card { background: white; border-radius: 12px; padding: 15px; margin: 20px 0; border: 2px solid #b3e5fc; text-align: left; font-size: 0.95rem; }
        .stats-line { display: flex; justify-content: space-between; margin: 8px 0; border-bottom: 1px dashed #e0e0e0; padding-bottom: 4px; }
        .footer { text-align: center; font-size: 0.8rem; color: #9e9e9e; margin-top: auto; padding-top: 20px; font-weight: bold; }
    </style>
</head>

        ];

        function binaAvatar() {
            let container = document.getElementById('avatar-container');
            container.innerHTML = '';
            senaraiAvatar.forEach(icon => {
                let btn = document.createElement('button');
                btn.className = `avatar-btn ${icon === avatarPilihan ? 'active' : ''}`;
                btn.innerText = icon;
                btn.onclick = () => {
                    document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    avatarPilihan = icon;
                };
                container.appendChild(btn);
            });
        }

        // ================= KEMASKINI BAHASA & UI =================
        function kemasKiniUI() {
            const ui = teksUI[lang];
            document.getElementById('langToggleBtn').innerText = ui.toggle;
            
            // Screen 1: Login
            if(document.getElementById('ui-tajuk')) document.getElementById('ui-tajuk').innerText = ui.tajuk;
            if(document.getElementById('ui-sub')) document.getElementById('ui-sub').innerText = ui.sub;
            if(document.getElementById('ui-lbl-avatar')) document.getElementById('ui-lbl-avatar').innerText = ui.lblAvatar;
            if(document.getElementById('ui-lbl-nama')) document.getElementById('ui-lbl-nama').innerText = ui.lblNama;
            if(document.getElementById('username')) document.getElementById('username').placeholder = ui.placeholder;
            if(document.getElementById('ui-btn-simpan')) document.getElementById('ui-btn-simpan').innerText = ui.btnSimpan;
            if(document.getElementById('ui-divider')) document.getElementById('ui-divider').innerText = ui.divider;

            // Screen 2: Menu
            if(document.getElementById('ui-menu-tajuk')) document.getElementById('ui-menu-tajuk').innerText = ui.menuTajuk;
            if(document.getElementById('ui-menu-selamat')) document.getElementById('ui-menu-selamat').innerHTML = `${ui.selamatDatang} <br><span id="mu-name" style="color:#2e7d32; font-size:1.8rem;">${localStorage.getItem('namaMurid') || ''}</span>!`;
            if(document.getElementById('ui-menu-markah')) document.getElementById('ui-menu-markah').innerText = ui.markahTertinggi;
            if(document.getElementById('ui-btn-mula')) document.getElementById('ui-btn-mula').innerText = ui.btnMula;
            if(document.getElementById('ui-btn-rekod')) document.getElementById('ui-btn-rekod').innerText = ui.btnRekod;
            if(document.getElementById('ui-btn-padam')) document.getElementById('ui-btn-padam').innerText = ui.btnPadam;

            // Screen 3: Quiz/Dashboard Elements
            if(document.getElementById('main-title')) document.getElementById('main-title').innerText = ui.titleQuiz;
            if(document.getElementById('ui-btn-kembali')) document.getElementById('ui-btn-kembali').innerText = ui.btnKembali;
            
            let elemenNama = document.getElementById('paparNama');
            if (elemenNama && elemenNama.style.display !== "none") {
                let namaTerkini = localStorage.getItem('namaMurid') || "SAINTIS";
                let avatarTerkini = localStorage.getItem('avatarMurid') || "🎒";
                elemenNama.innerHTML = `${avatarTerkini} ${ui.saintisLabel}: <span style="color:#1b5e20">${namaTerkini.toUpperCase()}</span>`;
            }

            if (document.getElementById("progress-text") && kuizSoalan.length > 0 && document.getElementById("header-bar").style.display !== "none") {
                document.getElementById("progress-text").innerText = `${ui.soalan}: ${soalanSekarang + 1}/${JUMLAH_SOALAN}`;
                document.getElementById("score-text").innerText = `${ui.markah}: ${markah}`;
            }

            // Jika sedang dalam soalan
            let pnlSoalan = document.querySelector(".question-text");
            if(pnlSoalan && document.getElementById("header-bar").style.display !== "none") {
                renderSoalanSemula();
            }

            // Jika dalam skrin Game Over / Tahniah
            if(document.getElementById('end-title')) {
                if (nyawa <= 0) {
                    document.getElementById('end-title').innerText = ui.gameOver;
                    document.getElementById('end-desc').innerText = ui.nyawaHabis;
                    document.getElementById('end-score-label').innerText = ui.markahTerkumpul;
                    document.getElementById('end-btn-text').innerText = ui.cubaLagi;
                } else {
                    document.getElementById('end-title').innerText = ui.tahniah;
                    document.getElementById('end-score-label').innerText = ui.markah;
                    document.getElementById('end-btn-text').innerText = ui.mainLagi;
                }
            }

            // Jika dalam Dashboard Prestasi
            if(document.getElementById('dash-title')) {
                document.getElementById('dash-title').innerText = ui.dashTajuk;
                document.getElementById('dash-desc').innerText = ui.dashDesc;
                document.getElementById('dash-lbl-anak').innerText = ui.lblAnak;
                document.getElementById('dash-lbl-tertinggi').innerText = ui.lblTertinggi;
                document.getElementById('dash-lbl-gred').innerText = ui.lblGred;
                document.getElementById('dash-lbl-latihan').innerText = ui.lblLatihan;
                document.getElementById('dash-lbl-ujian').innerText = ui.lblUjian;
                
                let hScore = parseInt(localStorage.getItem('sains_kuiz1_high_score') || "0");
                let komenPrestasi = "";
                if (lang === 'ms') {
                    if(hScore >= 80) komenPrestasi = "Hebat! Teruskan kecemerlangan! 🌟";
                    else if(hScore >= 60) komenPrestasi = "Bagus! Sikit lagi nak capai 100! 👍";
                    else if(hScore >= 40) komenPrestasi = "Boleh tahan! Mari perbaiki lagi! 👌";
                    else komenPrestasi = "Jangan putus asa, teruskan usaha! 💪";
                } else {
                    if(hScore >= 80) komenPrestasi = "Awesome! Keep up the excellent work! 🌟";
                    else if(hScore >= 60) komenPrestasi = "Good job! Almost at 100! 👍";
                    else if(hScore >= 40) komenPrestasi = "Not bad! Let's improve more! 👌";
                    else komenPrestasi = "Don't give up, keep trying! 💪";
                }
                document.getElementById('dash-komen').innerText = komenPrestasi;
            }
        }

        function tukarBahasa() {
            lang = lang === 'ms' ? 'en' : 'ms';
            kemasKiniUI();
        }

        // ================= LOGIK PROFIL =================
        function semakProfilSediaAda() {
            let nama = localStorage.getItem('namaMurid');
            let avatar = localStorage.getItem('avatarMurid') || '👤';
            let markah = localStorage.getItem('sains_kuiz1_high_score') || "0";

            if (nama) {
                // Sembunyikan login, terus masuk menu
                document.getElementById('screen-login').style.display = 'none';
                paparMenuUtama();
            } else {
                // Tunjuk form login
                document.getElementById('screen-login').style.display = 'block';
                document.getElementById('screen-menu').style.display = 'none';
                document.getElementById('screen-quiz').style.display = 'none';
            }
        }

        function simpanProfil() {
            let inputNama = document.getElementById("username").value.trim();
            if (!inputNama) {
                alert(lang === 'ms' ? "Sila masukkan nama anda!" : "Please enter your name!");
                return;
            }
            
            inputNama = inputNama.replace(/🤖/g, '').trim();
            localStorage.setItem('namaMurid', inputNama);
            localStorage.setItem('avatarMurid', avatarPilihan);
            
            if(!localStorage.getItem('sains_kuiz1_high_score')) {
                localStorage.setItem('sains_kuiz1_high_score', "0");
                localStorage.setItem('sains_kuiz1_total_main', "0");
            }

            document.getElementById('screen-login').style.display = 'none';
            paparMenuUtama();
        }

        function paparMenuUtama() {
            document.getElementById('screen-menu').style.display = 'block';
            document.getElementById('screen-quiz').style.display = 'none';

            let nama = localStorage.getItem('namaMurid') || 'CILIK';
            let avatar = localStorage.getItem('avatarMurid') || '🎒';
            let markah = localStorage.getItem('sains_kuiz1_high_score') || "0";

            document.getElementById('mu-name').innerText = nama.toUpperCase();
            document.getElementById('mu-avatar').innerText = avatar;
            document.getElementById('mu-score').innerText = markah;
            kemasKiniUI();
        }

        function logKeluar() {
            let confirmMsg = lang === 'ms' ? "Adakah anda pasti mahu memadam profil ini?" : "Are you sure you want to delete this profile?";
            if(confirm(confirmMsg)) {
                localStorage.removeItem('namaMurid');
                localStorage.removeItem('avatarMurid');
                localStorage.removeItem('sains_kuiz1_high_score');
                localStorage.removeItem('sains_kuiz1_total_main');
                localStorage.removeItem('sains_kuiz1_last_date');
                location.reload();
            }
        }

        // ================= LOGIK KUIZ =================
        function kemaskiniNyawa() {
            let hStr = "";
            for (let i = 0; i < nyawa; i++) hStr += "❤️ ";
            if (nyawa === 0) hStr = "💔 " + teksUI[lang].gameOver;
            document.getElementById("hearts-layer").innerText = hStr ? hStr.trim() : "💔";
        }

        function mulaKuiz() {
            // Tukar skrin
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('screen-quiz').style.display = 'flex';
            document.getElementById("header-bar").style.display = "flex";

            let namaFinal = localStorage.getItem('namaMurid') || "CILIK";
            let avatarFinal = localStorage.getItem('avatarMurid') || "🎒";
            let elemenNama = document.getElementById('paparNama');
            elemenNama.innerHTML = `${avatarFinal} ${teksUI[lang].saintisLabel}: <span style="color:#1b5e20">${namaFinal.toUpperCase()}</span>`;
            elemenNama.style.display = "block";

            kuizSoalan = bankSoalan.sort(() => 0.5 - Math.random()).slice(0, JUMLAH_SOALAN);
            soalanSekarang = 0;
            markah = 0;
            nyawa = 3;
            kemaskiniNyawa();
            paparSoalan();
        }

        function paparSoalan() {
            jawapanDipilih = null;
            renderSoalanSemula();
        }

        function renderSoalanSemula() {
            let quizArea = document.getElementById("quiz-area");
            let data = kuizSoalan[soalanSekarang];
            let ui = teksUI[lang];
            
            document.getElementById("progress-text").innerText = `${ui.soalan}: ${soalanSekarang + 1}/${JUMLAH_SOALAN}`;
            document.getElementById("score-text").innerText = `${ui.markah}: ${markah}`;
            
            quizArea.innerHTML = `
                <div class="question-text">${data.q[lang]}</div>
                <div id="options-container"></div>
                <div id="result-message"></div>
                <button class="action-btn" id="next-btn" style="display:none; margin-top:10px;" onclick="keSoalanSeterusnya()">${ui.seterusnya}</button>
            `;
            
            let container = document.getElementById("options-container");
            data.options[lang].forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                
                if (jawapanDipilih !== null) {
                    if (index === data.correct) {
                        btn.style.backgroundColor = "#c8e6c9";
                        btn.style.borderColor = "#4caf50";
                    } else if (index === jawapanDipilih && jawapanDipilih !== data.correct) {
                        btn.style.backgroundColor = "#ffcdd2";
                        btn.style.borderColor = "#f44336";
                    }
                } else {
                    btn.onclick = () => pilihJawapan(index, btn);
                }
                container.appendChild(btn);
            });

            if (jawapanDipilih !== null) {
                let msg = document.getElementById("result-message");
                if (jawapanDipilih === data.correct) {
                    msg.innerText = ui.betul;
                    msg.style.color = "#2e7d32";
                } else {
                    msg.innerText = ui.salah;
                    msg.style.color = "#c62828";
                }
                document.getElementById("next-btn").style.display = "block";
            }
        }

        function pilihJawapan(index, element) {
            if (jawapanDipilih !== null) return;
            
            jawapanDipilih = index;
            let data = kuizSoalan[soalanSekarang];
            let msg = document.getElementById("result-message");
            let buttons = document.querySelectorAll(".option-btn");
            let ui = teksUI[lang];
            
            if (index === data.correct) {
                element.style.backgroundColor = "#c8e6c9";
                element.style.borderColor = "#4caf50";
                msg.innerText = ui.betul;
                msg.style.color = "#2e7d32";
                markah += 5;
                document.getElementById("score-text").innerText = `${ui.markah}: ${markah}`;
            } else {
                element.style.backgroundColor = "#ffcdd2";
                element.style.borderColor = "#f44336";
                buttons[data.correct].style.backgroundColor = "#c8e6c9";
                buttons[data.correct].style.borderColor = "#4caf50";
                msg.innerText = ui.salah;
                msg.style.color = "#c62828";
                nyawa--;
                kemaskiniNyawa();
            }
            document.getElementById("next-btn").style.display = "block";
        }

        function keSoalanSeterusnya() {
            if (nyawa <= 0) {
                tamatKuiz(true);
                return;
            }
            soalanSekarang++;
            if (soalanSekarang < JUMLAH_SOALAN) {
                paparSoalan();
            } else {
                tamatKuiz(false);
            }
        }

        function tamatKuiz(isGameOver) {
            document.getElementById("header-bar").style.display = "none";
            let quizArea = document.getElementById("quiz-area");
            let ui = teksUI[lang];
            
            let totalMain = parseInt(localStorage.getItem('sains_kuiz1_total_main') || "0") + 1;
            let markahTertinggi = parseInt(localStorage.getItem('sains_kuiz1_high_score') || "0");
            if (markah > markahTertinggi) {
                localStorage.setItem('sains_kuiz1_high_score', markah);
            }
            localStorage.setItem('sains_kuiz1_total_main', totalMain);
            localStorage.setItem('sains_kuiz1_last_date', new Date().toLocaleDateString('ms-MY'));

            if (isGameOver) {
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">💥</span>
                        <h3 id="end-title" style="color:#c62828; margin:10px 0;">${ui.gameOver}</h3>
                        <p id="end-desc">${ui.nyawaHabis}</p>
                        <p style="font-size:1.1rem; font-weight:bold;"><span id="end-score-label">${ui.markahTerkumpul}</span>: <span style="color:#c62828;">${markah}</span></p>
                        <button onclick="mulaKuiz()" class="action-btn" style="margin-top:15px;">🔄 <span id="end-btn-text">${ui.cubaLagi}</span></button>
                    </div>
                `;
            } else {
                let piala = markah >= 80 ? "🏆" : "🥈";
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">${piala}</span>
                        <h3 id="end-title" style="color:#4caf50; margin:10px 0;">${ui.tahniah}</h3>
                        <p style="font-size:1.1rem; font-weight:bold;"><span id="end-score-label">${ui.markah}</span>:<br><span style="color:#4caf50; font-size:2.5rem;">💯 ${markah}/100</span></p>
                        <button onclick="mulaKuiz()" class="action-btn" style="margin-top:15px;">🔄 <span id="end-btn-text">${ui.mainLagi}</span></button>
                    </div>
                `;
            }
        }

        // ================= DASHBOARD PRESTASI =================
        function paparSistemPrestasi() {
            // Tukar skrin terus masuk ke kawasan kuiz untuk tunjuk report
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('screen-quiz').style.display = 'flex';
            document.getElementById('header-bar').style.display = 'none';

            let quizArea = document.getElementById("quiz-area");
            let ui = teksUI[lang];
            let namaAnak = localStorage.getItem('namaMurid') || "-";
            let hScore = parseInt(localStorage.getItem('sains_kuiz1_high_score') || "0");
            let tMain = localStorage.getItem('sains_kuiz1_total_main') || "0";
            let lDate = localStorage.getItem('sains_kuiz1_last_date') || "-";
            
            let komenPrestasi = "";
            if (lang === 'ms') {
                if(hScore >= 80) komenPrestasi = "Hebat! Teruskan kecemerlangan! 🌟";
                else if(hScore >= 60) komenPrestasi = "Bagus! Sikit lagi nak capai 100! 👍";
                else if(hScore >= 40) komenPrestasi = "Boleh tahan! Mari perbaiki lagi! 👌";
                else komenPrestasi = "Jangan putus asa, teruskan usaha! 💪";
            } else {
                if(hScore >= 80) komenPrestasi = "Awesome! Keep up the excellent work! 🌟";
                else if(hScore >= 60) komenPrestasi = "Good job! Almost at 100! 👍";
                else if(hScore >= 40) komenPrestasi = "Not bad! Let's improve more! 👌";
                else komenPrestasi = "Don't give up, keep trying! 💪";
            }

            quizArea.innerHTML = `
                <div class="instruction-screen">
                    <div>
                        <span style="font-size: 3rem;">📊</span>
                        <h3 id="dash-title" style="color: #0288d1; margin: 5px 0;">${ui.dashTajuk}</h3>
                        <p id="dash-desc" style="font-size:0.85rem; color:#666; margin-bottom:10px;">${ui.dashDesc}</p>
                        
                        <div class="stats-card">
                            <div class="stats-line"><b id="dash-lbl-anak">${ui.lblAnak}</b> <span>${namaAnak.toUpperCase()}</span></div>
                            <div class="stats-line"><b id="dash-lbl-tertinggi">${ui.lblTertinggi}</b> <span style="color:#4caf50; font-weight:bold;">${hScore}/100</span></div>
                            <div class="stats-line"><b id="dash-lbl-gred">${ui.lblGred}</b> <span id="dash-komen" style="color:#e65100; font-weight:bold; text-align:right; margin-left:10px;">${komenPrestasi}</span></div>
                            <div class="stats-line"><b id="dash-lbl-latihan">${ui.lblLatihan}</b> <span>${tMain}</span></div>
                            <div class="stats-line"><b id="dash-lbl-ujian">${ui.lblUjian}</b> <span>${lDate}</span></div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.onload = function() {
            binaAvatar();
            kemasKiniUI();
            semakProfilSediaAda();
        };
    </script>
</body>
</html>
