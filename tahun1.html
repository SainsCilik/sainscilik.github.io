<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sains Cilik Tahun 1 - Daftar Profil</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #e0f2f1;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .phone-wrapper {
            width: 100%;
            max-width: 420px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .avatar-main {
            font-size: 5rem;
            margin-top: 40px;
            animation: bounce 2 s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h2 { color: #004d40; font-size: 1.8rem; margin: 20px 0 10px 0; text-align: center; }
        p { color: #555; text-align: center; font-size: 1rem; margin-bottom: 30px; }
        
        .input-box {
            width: 100%;
            background: #f5f5f5;
            border: 2px solid #b2dfdb;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.1rem;
            text-align: center;
            font-family: inherit;
            margin-bottom: 25px;
            box-sizing: border-box;
        }
        .menu-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #004d40;
            background-color: #00796b;
            transition: 0.1s;
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #004d40;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="avatar-main">👧👦</div>
        <h2>Profil Sains Tahun 1</h2>
        <p>Sila masukkan nama anda sebelum memulakan kuiz!</p>
        
        <!-- Kotak Isi Nama -->
        <input type="text" id="username" class="input-box" placeholder="✍️ Taip nama anda di sini...">
        
        <!-- Butang Mula Kuiz -->
        <button class="menu-btn" onclick="simpanNamaDanMula()">MULA KUIZ SAINS 🚀</button>
    </div>

    <script>
        function simpanNamaDanMula() {
            // 1. Ambil nama daripada kotak input di atas
            let nama = document.getElementById("username").value.trim();
            
            // Jika kosong, letak nama backup
            if (nama === "") {
                nama = "Saintis Cilik";
            }
            
            // 2. SIMPAN NAMA DALAM MEMORI KOMPUTER (Penting!)
            localStorage.setItem("namaMurid", nama);
            
            // 3. Lompat terus ke halaman kuiz belajar1.html
            location.href = "belajar1.html";
        }
    </script>

</body>
</html>
