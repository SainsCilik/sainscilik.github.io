        .footer { text-align: center; font-size: 0.8rem; color: #9e9e9e; margin-top: auto; padding-top: 20px; font-weight: bold; }

        // BANK 50 SOALAN TAHUN 6 KSSR (4 PILIHAN JAWAPAN A, B, C, D)
        const bankSoalan = [
            { q: { ms: "Apakah maksud mikroorganisma?", en: "What is the meaning of microorganisms?" }, options: { ms: ["Haiwan yang sangat besar", "Tumbuh-tumbuhan yang hidup di air", "Hidupan seni yang tidak dapat dilihat dengan mata kasar", "Serangga yang boleh terbang"], en: ["Very large animals", "Plants that live in water", "Tiny living things that cannot be seen with the naked eye", "Insects that can fly"] }, correct: 2 },
            { q: { ms: "Antara berikut, yang manakah merupakan kumpulan mikroorganisma yang paling kecil?", en: "Which of the following is the smallest group of microorganisms?" }, options: { ms: ["Kulat (Fungi)", "Virus", "Bakteria", "Alga"], en: ["Fungi", "Virus", "Bacteria", "Algae"] }, correct: 1 },
            { q: { ms: "Kesan yis dalam adunan roti membuktikan bahawa mikroorganisma menjalani proses hidup iaitu?", en: "The effect of yeast in bread dough proves that microorganisms undergo a life process which is?" }, options: { ms: ["Bertumbuh", "Bernafas", "Bergerak", "Berkomunikasi"], en: ["Growing", "Breathing", "Moving", "Communicating"] }, correct: 1 },
            { q: { ms: "Mikroorganisma boleh membawa kesan buruk. Antara berikut, apakah keburukan mikroorganisma?", en: "Microorganisms can have harmful effects. Which of the following is a harmful effect of microorganisms?" }, options: { ms: ["Membuat keju", "Menghasilkan vaksin", "Menguraikan bahan buangan", "Menyebabkan keracunan makanan"], en: ["Making cheese", "Producing vaccines", "Decomposing waste materials", "Causing food poisoning"] }, correct: 3 },
            { q: { ms: "Bakteria baik sering digunakan di dalam industri pembuatan makanan untuk menghasilkan?", en: "Good bacteria are often used in the food manufacturing industry to produce?" }, options: { ms: ["Garam dan gula", "Yogurt dan keju", "Tepung gandum", "Minyak masak"], en: ["Salt and sugar", "Yogurt and cheese", "Wheat flour", "Cooking oil"] }, correct: 1 },
            { q: { ms: "Bagaimanakah cara yang paling berkesan untuk mencegah jangkitan penyakit bawaan mikroorganisma?", en: "What is the most effective way to prevent diseases transmitted by microorganisms?" }, options: { ms: ["Tidur lewat", "Kerap mencuci tangan dengan sabun", "Makan makanan manis", "Berkongsi tuala dengan orang lain"], en: ["Sleep late", "Wash hands frequently with soap", "Eat sweet foods", "Share a towel with others"] }, correct: 1 },
            { q: { ms: "Haiwan yang hidup di suatu habitat yang sama akan bersaing untuk mendapatkan keperluan asas. Apakah bentuk persaingan itu?", en: "Animals living in the same habitat will compete for basic needs. What are they competing for?" }, options: { ms: ["Makanan, air, ruang dan pasangan", "Udara dan cahaya", "Keluarga dan kawan", "Tempat berlindung sahaja"], en: ["Food, water, space and mates", "Air and light", "Family and friends", "Shelter only"] }, correct: 0 },
            { q: { ms: "Bagi tumbuh-tumbuhan, mereka BUKAN bersaing untuk mendapatkan pasangan. Sebaliknya, pokok bersaing untuk?", en: "For plants, they DO NOT compete for mates. Instead, trees compete for?" }, options: { ms: ["Darah dan oksigen", "Baja yang ditabur manusia", "Cahaya matahari, air, ruang dan nutrien", "Perhatian haiwan"], en: ["Blood and oxygen", "Fertilizer scattered by humans", "Sunlight, water, space and nutrients", "Animal attention"] }, correct: 2 },
            { q: { ms: "Apakah yang dimaksudkan dengan Simbiosis dalam kalangan haiwan dan tumbuhan?", en: "What is meant by Symbiosis among animals and plants?" }, options: { ms: ["Cara haiwan membiak", "Hubungan rapat antara dua spesies yang hidup bersama", "Persaingan untuk mendapatkan makanan", "Proses haiwan mencari tempat tinggal"], en: ["How animals reproduce", "A close relationship between two species living together", "Competition to get food", "The process of animals finding shelter"] }, correct: 1 },
            { q: { ms: "Interaksi Mutualisme bermaksud hubungan antara dua haiwan yang membawa kesan?", en: "Mutualism interaction means a relationship between two animals that brings the effect of?" }, options: { ms: ["Satu mendapat untung, satu lagi rugi", "Kedua-duanya mendapat kerugian", "Kedua-duanya mendapat keuntungan (kebaikan)", "Satu untung, satu lagi tidak terjejas"], en: ["One benefits, the other loses", "Both lose", "Both get benefits (advantages)", "One benefits, the other is unaffected"] }, correct: 2 },
            { q: { ms: "Ikan remora mendapat makanan percuma dari serpihan makanan jerung, manakala jerung tidak terjejas. Ini adalah contoh?", en: "Remora fish get free food from shark's food scraps, while the shark is unaffected. This is an example of?" }, options: { ms: ["Komensalisme", "Parasitisme", "Mutualisme", "Persaingan"], en: ["Commensalism", "Parasitism", "Mutualism", "Competition"] }, correct: 0 },
            { q: { ms: "Kutu menghisap darah kucing dan menyebabkan kucing sakit. Ini adalah interaksi jenis?", en: "Fleas suck a cat's blood and make the cat sick. This is an interaction of type?" }, options: { ms: ["Komensalisme", "Parasitisme", "Mutualisme", "Mangsa-Pemangsa"], en: ["Commensalism", "Parasitism", "Mutualism", "Prey-Predator"] }, correct: 1 },

            { q: { ms: "Apakah maksud Pemuliharaan (Conservation)?", en: "What is the meaning of Conservation?" }, options: { ms: ["Memusnahkan hutan secara terancang", "Mengembalikan haiwan dan tumbuhan kepada keadaan semula jadi yang optimum", "Memindahkan haiwan ke negara lain", "Memelihara haiwan sebagai haiwan peliharaan"], en: ["Destroying forests systematically", "Restoring animals and plants to their optimal natural state", "Moving animals to other countries", "Keeping animals as pets"] }, correct: 1 },
            { q: { ms: "Haiwan manakah yang telah diisytiharkan PUPUS (Extinct) sepenuhnya dari muka bumi?", en: "Which animal has been declared completely EXTINCT from the face of the earth?" }, options: { ms: ["Burung Dodo dan Dinosaur", "Harimau Malaya", "Penyu Belimbing", "Orang Utan"], en: ["Dodo bird and Dinosaur", "Malayan Tiger", "Leatherback Turtle", "Orangutan"] }, correct: 0 },
            { q: { ms: "Haiwan seperti Orang Utan, Tapir dan Badak Sumbu dikelaskan sebagai?", en: "Animals like Orangutan, Tapir and Rhinoceros are classified as?" }, options: { ms: ["Haiwan peliharaan", "Haiwan pupus", "Haiwan terancam (Endangered)", "Haiwan ternakan"], en: ["Pets", "Extinct animals", "Endangered animals", "Livestock"] }, correct: 2 },
            { q: { ms: "Antara berikut, apakah faktor UTAMA yang menyebabkan haiwan dan tumbuhan diancam kepupusan?", en: "Among the following, what is the MAIN factor causing animals and plants to be threatened with extinction?" }, options: { ms: ["Kekurangan cahaya matahari", "Pembalakan haram dan pemburuan haram", "Haiwan saling berbunuhan", "Tumbuhan tidak mendapat air yang cukup"], en: ["Lack of sunlight", "Illegal logging and illegal poaching", "Animals killing each other", "Plants not getting enough water"] }, correct: 1 },

        function binaAvatar() {
            let container = document.getElementById('avatar-container');
            container.innerHTML = '';
            senaraiAvatar.forEach(icon => {
                let btn = document.createElement('button');
                btn.className = `avatar-btn ${icon === avatarPilihan ? 'active' : ''}`;
                btn.innerText = icon;
                btn.onclick = () => {
                    document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    avatarPilihan = icon;
                };
                container.appendChild(btn);
            });
        }

            if(document.getElementById('ui-tajuk')) document.getElementById('ui-tajuk').innerText = ui.tajuk;

        // ================= LOGIK MULTI-PROFIL TAHUN 6 =================
        function getSenaraiProfil() {
            return JSON.parse(localStorage.getItem('sains_profil_list_t6')) || [];
        }

        function getProfilSemasa() {
            let namaSemasa = localStorage.getItem('sains_semasa_t6');
            if(!namaSemasa) return null;
            let senarai = getSenaraiProfil();
            return senarai.find(p => p.name === namaSemasa);
        }

        function simpanDataSemasa(data) {
            let senarai = getSenaraiProfil();
            let index = senarai.findIndex(p => p.name === data.name);
            if(index !== -1) {
                senarai[index] = data;
                localStorage.setItem('sains_profil_list_t6', JSON.stringify(senarai));
            }
        }

        function semakProfilSediaAda() {
            let profilSemasa = localStorage.getItem('sains_semasa_t6');
            if (profilSemasa) {
                document.getElementById('screen-login').style.display = 'none';
                paparMenuUtama();
            } else {
                document.getElementById('screen-login').style.display = 'block';
                document.getElementById('screen-menu').style.display = 'none';
                document.getElementById('screen-quiz').style.display = 'none';
                renderSenaraiProfil();
            }
        }

        function renderSenaraiProfil() {
            let container = document.getElementById('existing-section');
            let listDiv = document.getElementById('existing-list');
            let senarai = getSenaraiProfil();

            if (senarai.length > 0) {
                container.style.display = 'block';
                listDiv.innerHTML = '';
                senarai.forEach(p => {
                    let row = document.createElement('div');
                    row.className = 'profile-row';

                    let btn = document.createElement('button');
                    btn.className = 'existing-profile-btn';
                    btn.innerHTML = `<div class="ep-left"><span>${p.avatar}</span> <span>${p.name}</span></div><div class="ep-right">⭐ ${p.hScore}</div>`;
                    btn.onclick = () => {
                        localStorage.setItem('sains_semasa_t6', p.name);
                        location.reload(); 
                    };

                    let delBtn = document.createElement('button');
                    delBtn.className = 'delete-profile-btn';
                    delBtn.innerHTML = '🗑️';
                    delBtn.onclick = () => padamProfil(p.name);

                    row.appendChild(btn);
                    row.appendChild(delBtn);
                    listDiv.appendChild(row);
                });
            } else {
                container.style.display = 'none';
            }
        }

        function padamProfil(nama) {
            let confirmMsg = lang === 'ms' ? `Adakah anda pasti mahu memadam profil ${nama}? Segala rekod markahnya akan hilang!` : `Are you sure you want to delete ${nama}'s profile? All their score records will be lost!`;
            if (confirm(confirmMsg)) {
                let senarai = getSenaraiProfil();
                senarai = senarai.filter(p => p.name !== nama);
                localStorage.setItem('sains_profil_list_t6', JSON.stringify(senarai));
                
                if (localStorage.getItem('sains_semasa_t6') === nama) {
                    localStorage.removeItem('sains_semasa_t6');
                }
                
                renderSenaraiProfil(); 
            }
        }

        function simpanProfil() {
            let inputNama = document.getElementById("username").value.trim().toUpperCase();
            if (!inputNama) {
                alert(lang === 'ms' ? "Sila masukkan nama anda!" : "Please enter your name!");
                return;
            }
            
            inputNama = inputNama.replace(/[\u{1F600}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F300}-\u{1F5FF}\u{1F900}-\u{1F9FF}\u{1FA70}-\u{1FAFF}]/gu, '').trim(); 
            
            let senarai = getSenaraiProfil();
            let index = senarai.findIndex(p => p.name === inputNama);

            if (index !== -1) {
                senarai[index].avatar = avatarPilihan;
            } else {
                senarai.push({
                    name: inputNama,
                    avatar: avatarPilihan,
                    hScore: 0,
                    tMain: 0,
                    lDate: "-"
                });
            }

            localStorage.setItem('sains_profil_list_t6', JSON.stringify(senarai));
            localStorage.setItem('sains_semasa_t6', inputNama);

            document.getElementById('screen-login').style.display = 'none';
            paparMenuUtama();
        }

        function paparMenuUtama() {
            let data = getProfilSemasa();
            if(!data) {
                logKeluar(); return; 
            }

            document.getElementById('screen-menu').style.display = 'block';
            document.getElementById('screen-quiz').style.display = 'none';

            document.getElementById('mu-name').innerText = data.name;
            document.getElementById('mu-avatar').innerText = data.avatar;
            document.getElementById('mu-score').innerText = data.hScore;
            kemasKiniUI();
        }

        function logKeluar() {
            localStorage.removeItem('sains_semasa_t6');
            location.reload();
        }

            let hStr = "";
            for (let i = 0; i < nyawa; i++) hStr += "❤️ ";

            document.getElementById("hearts-layer").innerText = hStr ? hStr.trim() : "💔";
        }

        function mulaKuiz() {
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('screen-quiz').style.display = 'flex';
            document.getElementById("header-bar").style.display = "flex";

            let data = getProfilSemasa();
            let elemenNama = document.getElementById('paparNama');
            if(data) {
                elemenNama.innerHTML = `${data.avatar} ${teksUI[lang].saintisLabel}: <span style="color:#1b5e20">${data.name}</span>`;
                elemenNama.style.display = "block";
            }

            kuizSoalan = bankSoalan.sort(() => 0.5 - Math.random()).slice(0, JUMLAH_SOALAN);
            soalanSekarang = 0;
            markah = 0;
            nyawa = 3;
            kemaskiniNyawa();
            paparSoalan();
        }

        function paparSoalan() {
            jawapanDipilih = null;
            renderSoalanSemula();
        }

        function renderSoalanSemula() {
            let quizArea = document.getElementById("quiz-area");
            let data = kuizSoalan[soalanSekarang];
            let ui = teksUI[lang];
            
            document.getElementById("progress-text").innerText = `${ui.soalan}: ${soalanSekarang + 1}/${JUMLAH_SOALAN}`;
            document.getElementById("score-text").innerText = `${ui.markah}: ${markah}`;
            
            quizArea.innerHTML = `
                <div class="question-text">${data.q[lang]}</div>
                <div id="options-container"></div>
                <div id="result-message"></div>
                <button class="action-btn" id="next-btn" style="display:none; margin-top:10px;" onclick="keSoalanSeterusnya()">${ui.seterusnya}</button>
            `;
            
            let container = document.getElementById("options-container");
            const abcd = ["A", "B", "C", "D"];
            
            data.options[lang].forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = `<span class="opt-letter">${abcd[index]}.</span> ${opt}`;
                
                if (jawapanDipilih !== null) {
                    if (index === data.correct) {
                        btn.style.backgroundColor = "#c8e6c9";
                        btn.style.borderColor = "#4caf50";
                    } else if (index === jawapanDipilih && jawapanDipilih !== data.correct) {
                        btn.style.backgroundColor = "#ffcdd2";
                        btn.style.borderColor = "#f44336";
                    }
                } else {
                    btn.onclick = () => pilihJawapan(index, btn);
                }
                container.appendChild(btn);
            });

            if (jawapanDipilih !== null) {
                let msg = document.getElementById("result-message");
                if (jawapanDipilih === data.correct) {
                    msg.innerText = ui.betul;
                    msg.style.color = "#2e7d32";
                } else {
                    msg.innerText = ui.salah;
                    msg.style.color = "#c62828";
                }
                document.getElementById("next-btn").style.display = "block";
            }
        }

        function pilihJawapan(index, element) {
            if (jawapanDipilih !== null) return;
            
            jawapanDipilih = index;
            let data = kuizSoalan[soalanSekarang];
            let msg = document.getElementById("result-message");
            let buttons = document.querySelectorAll(".option-btn");
            let ui = teksUI[lang];
            
            if (index === data.correct) {
                element.style.backgroundColor = "#c8e6c9";
                element.style.borderColor = "#4caf50";
                msg.innerText = ui.betul;
                msg.style.color = "#2e7d32";
                markah += 5;
                document.getElementById("score-text").innerText = `${ui.markah}: ${markah}`;
            } else {
                element.style.backgroundColor = "#ffcdd2";
                element.style.borderColor = "#f44336";
                buttons[data.correct].style.backgroundColor = "#c8e6c9";
                buttons[data.correct].style.borderColor = "#4caf50";
                msg.innerText = ui.salah;
                msg.style.color = "#c62828";
                nyawa--;
                kemaskiniNyawa();
            }
            document.getElementById("next-btn").style.display = "block";
        }

        function keSoalanSeterusnya() {
            if (nyawa <= 0) {
                tamatKuiz(true);
                return;
            }
            soalanSekarang++;
            if (soalanSekarang < JUMLAH_SOALAN) {
                paparSoalan();
            } else {
                tamatKuiz(false);
            }
        }

        function tamatKuiz(isGameOver) {
            document.getElementById("header-bar").style.display = "none";
            let quizArea = document.getElementById("quiz-area");
            let ui = teksUI[lang];
            
            let dataSemasa = getProfilSemasa();
            if(dataSemasa) {
                dataSemasa.tMain += 1;
                if(markah > dataSemasa.hScore) dataSemasa.hScore = markah;
                dataSemasa.lDate = new Date().toLocaleDateString('ms-MY');
                simpanDataSemasa(dataSemasa); 
            }

            if (isGameOver) {
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">💥</span>
                        <h3 id="end-title" style="color:#c62828; margin:10px 0;">${ui.gameOver}</h3>
                        <p id="end-desc">${ui.nyawaHabis}</p>
                        <p style="font-size:1.1rem; font-weight:bold;"><span id="end-score-label">${ui.markahTerkumpul}</span>: <span style="color:#c62828;">${markah}</span></p>
                        <button onclick="mulaKuiz()" class="action-btn" style="margin-top:15px;">🔄 <span id="end-btn-text">${ui.cubaLagi}</span></button>
                    </div>
                `;
            } else {
                let piala = markah >= 80 ? "🏆" : "🥈";
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">${piala}</span>
                        <h3 id="end-title" style="color:#4caf50; margin:10px 0;">${ui.tahniah}</h3>
                        <p style="font-size:1.1rem; font-weight:bold;"><span id="end-score-label">${ui.markah}</span>:<br><span style="color:#4caf50; font-size:2.5rem;">💯 ${markah}/100</span></p>
                        <button onclick="mulaKuiz()" class="action-btn" style="margin-top:15px;">🔄 <span id="end-btn-text">${ui.mainLagi}</span></button>
                    </div>
                `;
            }
        }

        // ================= DASHBOARD PRESTASI =================
        function paparSistemPrestasi() {
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('screen-quiz').style.display = 'flex';
            document.getElementById('header-bar').style.display = 'none';

            let quizArea = document.getElementById("quiz-area");
            let ui = teksUI[lang];
            let dataSemasa = getProfilSemasa();
            
            if(!dataSemasa) return; 

            let komenPrestasi = "";
            if (lang === 'ms') {
                if(dataSemasa.hScore >= 80) komenPrestasi = "Hebat! Teruskan kecemerlangan! 🌟";
                else if(dataSemasa.hScore >= 60) komenPrestasi = "Bagus! Sikit lagi nak capai 100! 👍";
                else if(dataSemasa.hScore >= 40) komenPrestasi = "Boleh tahan! Mari perbaiki lagi! 👌";
                else komenPrestasi = "Jangan putus asa, teruskan usaha! 💪";
            } else {
                if(dataSemasa.hScore >= 80) komenPrestasi = "Awesome! Keep up the excellent work! 🌟";
                else if(dataSemasa.hScore >= 60) komenPrestasi = "Good job! Almost at 100! 👍";
                else if(dataSemasa.hScore >= 40) komenPrestasi = "Not bad! Let's improve more! 👌";
                else komenPrestasi = "Don't give up, keep trying! 💪";
            }

            quizArea.innerHTML = `
                <div class="instruction-screen">
                    <div>
                        <span style="font-size: 3rem;">📊</span>
                        <h3 id="dash-title" style="color: #0288d1; margin: 5px 0;">${ui.dashTajuk}</h3>
                        <p id="dash-desc" style="font-size:0.85rem; color:#666; margin-bottom:10px;">${ui.dashDesc}</p>
                        
                        <div class="stats-card">
                            <div class="stats-line"><b id="dash-lbl-anak">${ui.lblAnak}</b> <span>${dataSemasa.name}</span></div>
                            <div class="stats-line"><b id="dash-lbl-tertinggi">${ui.lblTertinggi}</b> <span style="color:#4caf50; font-weight:bold;">${dataSemasa.hScore}/100</span></div>
                            <div class="stats-line"><b id="dash-lbl-gred">${ui.lblGred}</b> <span id="dash-komen" style="color:#e65100; font-weight:bold; text-align:right; margin-left:10px;">${komenPrestasi}</span></div>
                            <div class="stats-line"><b id="dash-lbl-latihan">${ui.lblLatihan}</b> <span>${dataSemasa.tMain}</span></div>
                            <div class="stats-line"><b id="dash-lbl-ujian">${ui.lblUjian}</b> <span>${dataSemasa.lDate}</span></div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.onload = function() {
            binaAvatar();
            semakProfilSediaAda(); 
            kemasKiniUI();
        };
    </script>
</body>
</html>
