<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sains Cilik Tahun 2 - Kuiz Latihan 2</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 420px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
            box-sizing: border-box;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            background: #c8e6c9;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            color: #1b5e20;
            margin-bottom: 20px;
        }

        .hearts { color: #ff5252; font-size: 1.2rem; }

        h1 { color: #2e7d32; text-align: center; font-size: 1.6rem; margin: 10px 0; }
        
        .kuiz-box {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .input-group {
            margin: 15px 0;
            text-align: left;
        }

        .input-group label {
            font-weight: bold;
            color: #2e7d32;
            display: block;
            margin-bottom: 8px;
        }

        .name-input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #4caf50;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .instruction-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }
        
        .instruction-box {
            background: #e8f5e9;
            border-left: 5px solid #4caf50;
            padding: 15px;
            text-align: left;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.5;
        }

        .option-btn {
            display: block;
            width: 100%;
            background-color: white;
            border: 3px solid #e0e0e0;
            padding: 14px;
            margin: 8px 0;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            font-weight: bold;
            box-shadow: 0 4px 0 #e0e0e0;
        }

        .action-btn {
            width: 100%;
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 5px 0 #1b5e20;
            cursor: pointer;
            margin-top: auto;
        }

        .report-btn {
            background-color: #0288d1;
            box-shadow: 0 5px 0 #01579b;
            margin-top: 10px;
        }

        .stats-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #b3e5fc;
            text-align: left;
            font-size: 0.95rem;
        }

        .stats-line {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            border-bottom: 1px dashed #e0e0e0;
            padding-bottom: 4px;
        }

        #result-message {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
        }

        .back-btn {
            text-align: center;
            display: block;
            background-color: #757575;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="quiz-header" id="header-bar" style="display: none;">
            <span id="progress-text">Soalan: 1/20</span>
            <span class="hearts" id="hearts-layer">❤️ ❤️ ❤️</span>
            <span id="score-text">Markah: 0</span>
        </div>

        <h1 id="main-title">Latihan Sains TAHUN 2 🎯</h1>
        <div id="paparNama" style="text-align:center; font-weight:bold; color:#1b5e20; margin-bottom:15px; font-size:1.1rem; display:none;"></div>
        
        <div class="kuiz-box" id="quiz-area">
            <!-- Skrin Utama -->
            <div class="instruction-screen" id="main-screen">
                <div>
                    <span style="font-size: 4rem;">🔬</span>
                    <h2 style="color: #1b5e20; margin-top: 5px;">Profil Saintis</h2>
                    
                    <div class="input-group">
                        <label>Nama Murid:</label>
                        <input type="text" id="username" class="name-input" placeholder="Masukkan nama..." autocomplete="off">
                    </div>

                    <div class="instruction-box">
                        🎯 Selesaikan <b>20 soalan</b> rawak daripada bank soalan.<br>
                        💯 Setiap jawapan betul memberikan <b>5 markah</b> (Maksimum 100).<br>
                        ❤️ Anda mempunyai <b>3 nyawa</b> sahaja. Berhati-hati menjawab!
                    </div>
                </div>
                <div>
                    <button class="action-btn" onclick="mulaKuiz()">🚀 MULA BELAJAR</button>
                    <button class="action-btn report-btn" onclick="paparSistemPrestasi()">📊 REKOD PRESTASI (IBU BAPA)</button>
                </div>
            </div>
        </div>

        <a href="tahun2.html" class="back-btn">⬅️ Keluar</a>
    </div>

    <script>
        // BANK 50 SOALAN TAHUN 2 - 100% BERSIH TANPA SEBARANG EMOJI DI SOALAN/JAWAPAN
        const bankSoalan = [
            { q: "Apakah keperluan asas manusia untuk mendapatkan tenaga?", options: ["Pakaian", "Makanan", "Rumah"], correct: 1 },
            { q: "Mengapakah manusia memerlukan tempat perlindungan?", options: ["Untuk membesar dengan cepat", "Untuk berlindung daripada bahaya dan cuaca buruk", "Untuk menyimpan makanan"], correct: 1 },
            { q: "Antara berikut, yang manakah merupakan tabiat hidup yang sihat?", options: ["Tidur lewat setiap hari", "Makan makanan seimbang", "Bermain permainan video tanpa henti"], correct: 1 },
            { q: "Haiwan yang manakah melahirkan anak?", options: ["Katil", "Kucing", "Ayam"], correct: 1 },
            { q: "Haiwan manakah yang bertelur dengan jumlah yang sangat banyak?", options: ["Burung merpati", "Katak", "Ayam"], correct: 1 },
            { q: "Apakah yang berlaku kepada saiz badan kita semasa proses tumbesaran?", options: ["Semakin mengecil", "Semakin bertambah dan membesar", "Kekal sama"], correct: 1 },
            { q: "Anak harimau menyerupai rupa bentuk siapa?", options: ["Induknya atau ibunya", "Bapanya sahaja", "Haiwan lain"], correct: 0 },
            { q: "Tumbuhan memerlukan perkara berikut untuk tumbesaran, kecuali?", options: ["Air", "Cahaya matahari", "Susu formula"], correct: 2 },
            { q: "Apakah sumber cahaya utama pada waktu siang?", options: ["Lampu suluh", "Matahari", "Lilin"], correct: 1 },
            { q: "Bilakah bayang-bayang akan terbentuk?", options: ["Apabila cahaya dihalang oleh objek legap", "Apabila keadaan terlalu gelap", "Apabila lampu dipadamkan"], correct: 0 },
            { q: "Antara berikut, aktiviti manakah yang lebih mudah dilakukan dalam keadaan terang?", options: ["Tidur", "Membaca buku", "Menonton wayang"], correct: 1 },
            { q: "Apakah fungsi utama sel kering di dalam sesebuah litar elektrik?", options: ["Menghasilkan cahaya", "Membekalkan tenaga elektrik", "Menyambungkan litar"], correct: 1 },
            { q: "Apakah komponen litar yang berfungsi untuk menyalakan cahaya?", options: ["Mentol", "Suis", "Wayar penyambung"], correct: 0 },
            { q: "Apakah tugas utama suis di dalam satu litar elektrik?", options: ["Membekalkan arus elektrik", "Menyambung dan memutuskan litar", "Membuat mentol menjadi berwarna"], correct: 1 },
            { q: "Bahan yang membenarkan arus elektrik mengalir melaluinya dikenali sebagai?", options: ["Konduktor", "Penebat", "Plastik"], correct: 0 },
            { q: "Antara objek berikut, yang manakah merupakan contoh penebat elektrik?", options: ["Paku besi", "Pembaris plastik", "Sudu logam"], correct: 1 },
            { q: "Bagaimanakah cara terbaik untuk mengasingkan campuran pasir dan klip kertas besi?", options: ["Menggunakan magnet", "Menggunakan penapis", "Menggunakan air"], correct: 0 },
            { q: "Kaedah mengayak sesuai digunakan untuk mengasingkan campuran apa?", options: ["Bahan yang berbeza saiz", "Bahan yang boleh larut dalam air", "Dua jenis cecair"], correct: 0 },
            { q: "Apakah cara untuk melarutkan gula dengan lebih cepat di dalam air?", options: ["Menggunakan air sejuk", "Menggunakan air panas dan mengacaunya", "Membiarkannya tanpa dikacau"], correct: 1 },
            { q: "Bahan manakah yang tidak boleh larut di dalam air walaupun dikacau?", options: ["Gula pasir", "Garam halus", "Batu kerikil"], correct: 2 },
            { q: "Apakah sumber cahaya semulajadi pada waktu malam jika langit cerah?", options: ["Lampu jalan", "Bintang dan bulan", "Api lilin"], correct: 1 },
            { q: "Haiwan manakah yang menjaga anaknya selepas dilahirkan?", options: ["Kanggaru", "Penyu", "Katak"], correct: 0 },
            { q: "Antara berikut, yang manakah merupakan urutan tumbesaran manusia yang betul?", options: ["Bayi ke Kanak-kanak ke Dewasa", "Dewasa ke Bayi ke Remaja", "Kanak-kanak ke Bayi ke Dewasa"], correct: 0 },
            { q: "Mengapakah mentol tidak menyala dalam litar elektrik yang lengkap?", options: ["Kerana suis ditutup", "Kerana sel kering telah kehabisan tenaga", "Kerana wayar terlalu panjang"], correct: 1 },
            { q: "Sudu besi ialah contoh konduktor elektrik kerana ia diperbuat daripada?", options: ["Kayu", "Logam", "Kain"], correct: 1 },
            { q: "Apakah yang akan terjadi jika kita membaca buku dalam keadaan yang terlalu gelap?", options: ["Mata akan menjadi rosak atau sakit", "Tulisan menjadi lebih besar", "Membaca menjadi lebih cepat"], correct: 0 },
            { q: "Apakah fungsi akar bagi tumbesaran pokok?", options: ["Menyerap air dan nutrien dari tanah", "Membuat makanan menggunakan cahaya matahari", "Menghasilkan bau wangi"], correct: 0 },
            { q: "Haiwan manakah yang bertelur tetapi menjaga dan mengeramkan telurnya?", options: ["Penyu", "Ayam", "Ikan"], correct: 1 },
            { q: "Apakah bahan utama yang digunakan untuk membuat set binaan mengikut manual?", options: ["Batu bata", "Komponen blok pelbagai bentuk", "Tanah liat"], correct: 1 },
            { q: "Di manakah kita boleh merujuk untuk memasang komponen set binaan dengan betul?", options: ["Buku cerita", "Manual panduan pemasangan", "Surat khabar"], correct: 1 },
            { q: "Apakah keperluan asas untuk biji benih mula bercambah?", options: ["Air, udara dan suhu yang sesuai", "Cahaya matahari sahaja", "Baja yang mahal"], correct: 0 },
            { q: "Apakah perubahan yang dapat dilihat apabila sebatang pokok semakin membesar?", options: ["Bilangan daun bertambah dan batang menjadi tinggi", "Warna batang bertukar merah", "Pokok menjadi semakin pendek"], correct: 0 },
            { q: "Apakah rupa bentuk fizikal anak katak yang baru menetas?", options: ["Mempunyai empat kaki", "Berbentuk berudu dan mempunyai ekor", "Sama rupa dengan katak dewasa"], correct: 1 },
            { q: "Antara haiwan berikut, yang manakah melahirkan anak yang sedikit pada satu-satu masa?", options: ["Gajah", "Kucing", "Tikus"], correct: 0 },
            { q: "Objek legap akan menghasilkan bayang-bayang yang bagaimana?", options: ["Sangat jelas dan gelap", "Kabur", "Tidak kelihatan langsung"], correct: 0 },
            { q: "Wayar penyambung di dalam litar elektrik biasanya diperbuat daripada apa?", options: ["Tali plastik", "Kuprum atau logam", "Benang kain"], correct: 1 },
            { q: "Apakah contoh objek yang menggunakan sel kering untuk berfungsi?", options: ["Jam dinding", "Sudu makan", "Pintu kayu"], correct: 0 },
            { q: "Apakah kaedah terbaik untuk memisahkan daun teh daripada air teh?", options: ["Menggunakan kaedah menapis", "Menggunakan magnet", "Menggunakan kaedah mengayak"], correct: 0 },
            { q: "Apakah yang dimaksudkan dengan bahan larut?", options: ["Bahan yang hilang dan bercampur sekata di dalam air", "Bahan yang terapung di atas air", "Bahan yang tenggelam di dasar air"], correct: 0 },
            { q: "Mengapakah serbuk milo larut lebih cepat jika dikacau?", options: ["Kerana kacauan mempercepatkan proses pelarutan", "Kerana sudu bertukar warna", "Kerana air menjadi sejuk"], correct: 0 },
            { q: "Mengapakah kita perlu mengasingkan sampah mengikut jenis?", options: ["Untuk memudahkan proses kitar semula", "Untuk mencantikkan kawasan", "Saja-saja mengisi masa lapang"], correct: 0 },
            { q: "Apakah kegunaan utama cermin mata dalam membantu deria penglihatan?", options: ["Membantu melihat objek dengan lebih jelas", "Melindungi mata daripada air", "Menukar warna objek"], correct: 0 },
            { q: "Haiwan manakah yang mengalami perubahan rupa yang sangat berbeza dari peringkat anak ke dewasa?", options: ["Kucing", "Rama-rama", "Lembu"], correct: 1 },
            { q: "Apakah fungsi daun pada tumbuhan?", options: ["Menyerap air dari tanah", "Membuat makanan untuk tumbuhan", "Menyokong ranting"], correct: 1 },
            { q: "Antara bahan berikut, yang manakah boleh mengalirkan arus elektrik?", options: ["Pemeris plastik", "Pemadam getah", "Kunci besi"], correct: 2 },
            { q: "Lampu suluh mengeluarkan cahaya yang bersumberkan daripada?", options: ["Tenaga elektrik sel kering", "Cahaya matahari", "Lilin bakar"], correct: 0 },
            { q: "Apakah yang berlaku apabila suis dalam litar elektrik dibuka?", options: ["Mentol menyala lebih terang", "Arus elektrik terputus dan mentol padam", "Sel kering menjadi panas"], correct: 1 },
            { q: "Apakah kaedah mengapung sesuai digunakan?", options: ["Mengasingkan bahan yang boleh terapung daripada bahan yang tenggelam", "Mengasingkan besi", "Melarutkan garam"], correct: 0 },
            { q: "Garam halus lebih cepat larut berbanding garam kasar kerana?", options: ["Saiz saiz zarahnya yang lebih kecil", "Warnanya yang lebih putih", "Rasianya yang kurang masin"], correct: 0 },
            { q: "Selepas selesai memasang set binaan, apakah langkah yang perlu dilakukan?", options: ["Membiarkannya bersepah", "Membuka komponen dan menyimpannya semula ke dalam kotak", "Membuangnya ke dalam tong sampah"], correct: 1 }
        ];

        let kuizSoalan = [];
        let soalanSekarang = 0;
        let markah = 0;
        let nyawa = 3;
        let jawapanDipilih = null;
        const JUMLAH_SOALAN = 20;

        let namaDisimpan = localStorage.getItem('namaMurid') || "";
        if (namaDisimpan) {
            namaDisimpan = namaDisimpan.replace(/🤖/g, '').trim(); 
            document.getElementById('username').value = namaDisimpan;
        }

        function kemaskiniNyawa() {
            let hStr = "";
            for (let i = 0; i < nyawa; i++) hStr += "❤️ ";
            if (nyawa === 0) hStr = "💔 Game Over";
            document.getElementById("hearts-layer").innerText = hStr ? hStr.trim() : "💔";
        }

        function mulaKuiz() {
            let inputNama = document.getElementById("username").value.trim();
            let namaFinal = inputNama ? inputNama : "SAINTIS CILIK";
            
            namaFinal = namaFinal.replace(/🤖/g, '').trim();
            localStorage.setItem('namaMurid', namaFinal);

            let elemenNama = document.getElementById('paparNama');
            elemenNama.innerHTML = `🔬 Saintis: <span style="color:#1b5e20">${namaFinal.toUpperCase()}</span>`;
            elemenNama.style.display = "block";

            document.getElementById("main-screen").style.display = "none";
            document.getElementById("header-bar").style.display = "flex";
            
            kuizSoalan = bankSoalan.sort(() => 0.5 - Math.random()).slice(0, JUMLAH_SOALAN);
            
            soalanSekarang = 0;
            markah = 0;
            nyawa = 3;
            kemaskiniNyawa();
            paparSoalan();
        }

        function paparSoalan() {
            jawapanDipilih = null;
            let quizArea = document.getElementById("quiz-area");
            let data = kuizSoalan[soalanSekarang];
            document.getElementById("progress-text").innerText = `Soalan: ${soalanSekarang + 1}/${JUMLAH_SOALAN}`;
            
            quizArea.innerHTML = `
                <div class="question-text">${data.q}</div>
                <div id="options-container"></div>
                <div id="result-message"></div>
                <button class="action-btn" id="next-btn" style="display:none;" onclick="keSoalanSeterusnya()">SETERUSNYA ➡️</button>
            `;
            
            let container = document.getElementById("options-container");
            data.options.forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => pilihJawapan(index, btn);
                container.appendChild(btn);
            });
        }

        function pilihJawapan(index, element) {
            if (jawapanDipilih !== null) return;
            
            jawapanDipilih = index;
            let data = kuizSoalan[soalanSekarang];
            let msg = document.getElementById("result-message");
            let buttons = document.querySelectorAll(".option-btn");
            
            if (index === data.correct) {
                element.style.backgroundColor = "#c8e6c9";
                element.style.borderColor = "#4caf50";
                msg.innerText = "🎉 BETUL! (+5 Markah) 🌟";
                msg.style.color = "#2e7d32";
                markah += 5;
                document.getElementById("score-text").innerText = `Markah: ${markah}`;
            } else {
                element.style.backgroundColor = "#ffcdd2";
                element.style.borderColor = "#f44336";
                buttons[data.correct].style.backgroundColor = "#c8e6c9";
                buttons[data.correct].style.borderColor = "#4caf50";
                msg.innerText = "❌ SALAH! Jawapan betul warna hijau. 😉";
                msg.style.color = "#c62828";
                nyawa--;
                kemaskiniNyawa();
            }
            document.getElementById("next-btn").style.display = "block";
        }

        function keSoalanSeterusnya() {
            if (nyawa <= 0) {
                tamatKuiz(true);
                return;
            }
            
            soalanSekarang++;
            if (soalanSekarang < JUMLAH_SOALAN) {
                paparSoalan();
            } else {
                tamatKuiz(false);
            }
        }

        function tamatKuiz(isGameOver) {
            document.getElementById("header-bar").style.display = "none";
            let quizArea = document.getElementById("quiz-area");
            
            let totalMain = parseInt(localStorage.getItem('sains_kuiz2_total_main') || "0") + 1;
            let markahTertinggi = parseInt(localStorage.getItem('sains_kuiz2_high_score') || "0");
            if (markah > markahTertinggi) {
                localStorage.setItem('sains_kuiz2_high_score', markah);
            }
            localStorage.setItem('sains_kuiz2_total_main', totalMain);
            localStorage.setItem('sains_kuiz2_last_date', new Date().toLocaleDateString('ms-MY'));

            if (isGameOver) {
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">💥</span>
                        <h3 style="color:#c62828; margin:10px 0;">GAME OVER!</h3>
                        <p>Nyawa anda telah habis. Jangan putus asa, cuba lagi! 💪</p>
                        <p style="font-size:1.1rem; font-weight:bold;">Markah Terkumpul: <span style="color:#c62828;">${markah}</span></p>
                        <button onclick="location.reload()" class="action-btn">🔄 CUBA LAGI</button>
                    </div>
                `;
            } else {
                let piala = markah >= 80 ? "🏆" : "🥈";
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">${piala}</span>
                        <h3 style="color:#4caf50; margin:10px 0;">TAHNIAH KUIZ TAMAT!</h3>
                        <p style="font-size:1.1rem; font-weight:bold;">Markah Latihan 2:<br><span style="color:#4caf50; font-size:2.5rem;">💯 ${markah}/100</span></p>
                        <button onclick="location.reload()" class="action-btn">🔄 MAIN LAGI</button>
                    </div>
                `;
            }
        }

        function paparSistemPrestasi() {
            let quizArea = document.getElementById("quiz-area");
            let namaAnak = localStorage.getItem('namaMurid') || "Belum Letak Nama";
            namaAnak = namaAnak.replace(/🤖/g, '').trim(); 
            let hScore = localStorage.getItem('sains_kuiz2_high_score') || "0";
            let tMain = localStorage.getItem('sains_kuiz2_total_main') || "0";
            let lDate = localStorage.getItem('sains_kuiz2_last_date') || "Tiada Rekod";
            
            let gred = "U (Perlu Latihan)";
            if(hScore >= 80) gred = "A (Cemerlang) 🌟";
            else if(hScore >= 60) gred = "B (Bagus) 👍";
            else if(hScore >= 40) gred = "C (Lulus) 👌";

            quizArea.innerHTML = `
                <div class="instruction-screen">
                    <div>
                        <span style="font-size: 3rem;">📊</span>
                        <h3 style="color: #0288d1; margin: 5px 0;">Dashboard Ibu Bapa (Kuiz 2)</h3>
                        <p style="font-size:0.85rem; color:#666; margin-bottom:10px;">Semak perkembangan kuiz pengenalan anak anda.</p>
                        
                        <div class="stats-card">
                            <div class="stats-line"><b>Nama Anak:</b> <span>${namaAnak.toUpperCase()}</span></div>
                            <div class="stats-line"><b>Markah Tertinggi:</b> <span style="color:#4caf50; font-weight:bold;">${hScore}/100</span></div>
                            <div class="stats-line"><b>Gred Terbaik:</b> <span>${gred}</span></div>
                            <div class="stats-line"><b>Jumlah Latihan:</b> <span>${tMain} Kali</span></div>
                            <div class="stats-line"><b>Ujian Terakhir:</b> <span>${lDate}</span></div>
                        </div>
                    </div>
                    <button class="action-btn" style="background-color:#757575; box-shadow:0 5px 0 #424242;" onclick="location.reload()">⬅️ KEMBALI</button>
                </div>
            `;
        }
    </script>
</body>
</html>
