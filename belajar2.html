            { q: { ms: "Mengapakah kita perlu mengasingkan sampah mengikut jenis?", en: "Why do we need to separate trash by type?" }, options: { ms: ["Untuk memudahkan proses kitar semula", "Untuk mencantikkan kawasan", "Saja-saja mengisi masa lapang"], en: ["To facilitate the recycling process", "To beautify the area", "Just to fill free time"] }, correct: 0 },
            { q: { ms: "Apakah kegunaan utama cermin mata dalam membantu deria penglihatan?", en: "What is the main use of glasses in helping the sense of sight?" }, options: { ms: ["Membantu melihat objek dengan lebih jelas", "Melindungi mata daripada air", "Menukar warna objek"], en: ["Helps to see objects more clearly", "Protects eyes from water", "Changes the color of objects"] }, correct: 0 },
            { q: { ms: "Haiwan manakah yang mengalami perubahan rupa yang sangat berbeza dari peringkat anak ke dewasa?", en: "Which animal undergoes a very different physical change from young to adult?" }, options: { ms: ["Kucing", "Rama-rama", "Lembu"], en: ["Cat", "Butterfly", "Cow"] }, correct: 1 },
            { q: { ms: "Apakah fungsi daun pada tumbuhan?", en: "What is the function of leaves on a plant?" }, options: { ms: ["Menyerap air dari tanah", "Membuat makanan untuk tumbuhan", "Menyokong ranting"], en: ["Absorbs water from soil", "Makes food for the plant", "Supports branches"] }, correct: 1 },
            { q: { ms: "Antara bahan berikut, yang manakah boleh mengalirkan arus elektrik?", en: "Which of the following materials can conduct electricity?" }, options: { ms: ["Pembaris plastik", "Pemadam getah", "Kunci besi"], en: ["Plastic ruler", "Rubber eraser", "Iron key"] }, correct: 2 },
            { q: { ms: "Lampu suluh mengeluarkan cahaya yang bersumberkan daripada?", en: "A flashlight emits light sourced from?" }, options: { ms: ["Tenaga elektrik sel kering", "Cahaya matahari", "Lilin bakar"], en: ["Electrical energy of a dry cell", "Sunlight", "Burning candle"] }, correct: 0 },
            { q: { ms: "Apakah yang berlaku apabila suis dalam litar elektrik dibuka (off)?", en: "What happens when a switch in an electrical circuit is opened (off)?" }, options: { ms: ["Mentol menyala lebih terang", "Arus elektrik terputus dan mentol padam", "Sel kering menjadi panas"], en: ["The bulb shines brighter", "Electric current is disconnected and bulb turns off", "Dry cell becomes hot"] }, correct: 1 },
            { q: { ms: "Apakah kaedah mengapung sesuai digunakan?", en: "What is the floatation method suitable for?" }, options: { ms: ["Mengasingkan bahan yang boleh terapung daripada bahan yang tenggelam", "Mengasingkan besi", "Melarutkan garam"], en: ["Separating floating materials from sinking materials", "Separating iron", "Dissolving salt"] }, correct: 0 },
            { q: { ms: "Garam halus lebih cepat larut berbanding garam kasar kerana?", en: "Fine salt dissolves faster than coarse salt because?" }, options: { ms: ["Saiz zarahnya yang lebih kecil", "Warnanya yang lebih putih", "Rasanya yang kurang masin"], en: ["Its smaller particle size", "Its whiter color", "Its less salty taste"] }, correct: 0 },
            { q: { ms: "Selepas selesai memasang set binaan, apakah langkah yang perlu dilakukan?", en: "After finishing building the construction set, what step should be taken?" }, options: { ms: ["Membiarkannya bersepah", "Membuka komponen dan menyimpannya semula ke dalam kotak", "Membuangnya ke dalam tong sampah"], en: ["Leave it messy", "Disassemble components and store them back in the box", "Throw it in the trash can"] }, correct: 1 }
        ];

        let kuizSoalan = [];
        let soalanSekarang = 0;
        let markah = 0;
        let nyawa = 3;
        let jawapanDipilih = null;
        const JUMLAH_SOALAN = 20;

        let namaDisimpan = localStorage.getItem('namaMurid') || "";
        if (namaDisimpan) {
            namaDisimpan = namaDisimpan.replace(/🤖/g, '').trim(); 
            document.getElementById('username').value = namaDisimpan;
        }

        function kemasKiniUI() {
            const ui = teksUI[lang];
            document.getElementById('langToggleBtn').innerText = ui.toggleBtn;
            document.getElementById('main-title').innerText = ui.title;
            
            // Elemen Utama (jika wujud di DOM)
            if(document.getElementById('ui-profil')) document.getElementById('ui-profil').innerText = ui.profil;
            if(document.getElementById('ui-nama')) document.getElementById('ui-nama').innerText = ui.nama;
            if(document.getElementById('username')) document.getElementById('username').placeholder = ui.placeholder;
            if(document.getElementById('ui-instruksi')) document.getElementById('ui-instruksi').innerHTML = ui.instruksi;
            if(document.getElementById('ui-btn-mula')) document.getElementById('ui-btn-mula').innerText = ui.btnMula;
            if(document.getElementById('ui-btn-rekod')) document.getElementById('ui-btn-rekod').innerText = ui.btnRekod;
            if(document.getElementById('ui-btn-keluar')) document.getElementById('ui-btn-keluar').innerText = ui.btnKeluar;
            
            // Header Bar
            if (document.getElementById("progress-text") && kuizSoalan.length > 0) {
                document.getElementById("progress-text").innerText = `${ui.soalan}: ${soalanSekarang + 1}/${JUMLAH_SOALAN}`;
                document.getElementById("score-text").innerText = `${ui.markah}: ${markah}`;
            }

            // Update label nama jika ada
            let elemenNama = document.getElementById('paparNama');
            if (elemenNama && elemenNama.style.display !== "none") {
                let namaTerkini = localStorage.getItem('namaMurid') || "SAINTIS";
                elemenNama.innerHTML = `🔬 ${ui.saintisLabel}: <span style="color:#1b5e20">${namaTerkini.toUpperCase()}</span>`;
            }

            // Jika sedang berada dalam skrin SOALAN
            let pnlSoalan = document.querySelector(".question-text");
            if(pnlSoalan && document.getElementById("header-bar").style.display !== "none") {
                renderSoalanSemula();
            }

            // Jika sedang berada dalam skrin GAME OVER / TAHNIAH
            if(document.getElementById('end-title')) {
                if (nyawa <= 0) {
                    document.getElementById('end-title').innerText = ui.gameOver;
                    document.getElementById('end-desc').innerText = ui.nyawaHabis;
                    document.getElementById('end-score-label').innerText = ui.markahTerkumpul;
                    document.getElementById('end-btn-text').innerText = ui.cubaLagi;
                } else {
                    document.getElementById('end-title').innerText = ui.tahniah;
                    document.getElementById('end-score-label').innerText = ui.markah;
                    document.getElementById('end-btn-text').innerText = ui.mainLagi;
                }
            }

            // Jika sedang berada dalam skrin DASHBOARD IBU BAPA
            if(document.getElementById('dash-title')) {
                document.getElementById('dash-title').innerText = ui.dashTajuk;
                document.getElementById('dash-desc').innerText = ui.dashDesc;
                document.getElementById('dash-lbl-anak').innerText = ui.lblAnak;
                document.getElementById('dash-lbl-tertinggi').innerText = ui.lblTertinggi;
                document.getElementById('dash-lbl-gred').innerText = ui.lblGred;
                document.getElementById('dash-lbl-latihan').innerText = ui.lblLatihan;
                document.getElementById('dash-lbl-ujian').innerText = ui.lblUjian;
                document.getElementById('dash-btn-kembali').innerText = ui.btnKembali;
                
                let hScore = parseInt(localStorage.getItem('sains_kuiz2_high_score') || "0");
                let komenPrestasi = "";
                if (lang === 'ms') {
                    if(hScore >= 80) komenPrestasi = "Hebat! Teruskan kecemerlangan! 🌟";
                    else if(hScore >= 60) komenPrestasi = "Bagus! Sikit lagi nak capai 100! 👍";
                    else if(hScore >= 40) komenPrestasi = "Boleh tahan! Mari perbaiki lagi! 👌";
                    else komenPrestasi = "Jangan putus asa, teruskan usaha! 💪";
                } else {
                    if(hScore >= 80) komenPrestasi = "Awesome! Keep up the excellent work! 🌟";
                    else if(hScore >= 60) komenPrestasi = "Good job! Almost at 100! 👍";
                    else if(hScore >= 40) komenPrestasi = "Not bad! Let's improve more! 👌";
                    else komenPrestasi = "Don't give up, keep trying! 💪";
                }
                document.getElementById('dash-komen').innerText = komenPrestasi;
            }
        }

        function tukarBahasa() {
            lang = lang === 'ms' ? 'en' : 'ms';
            kemasKiniUI();
        }

        function kemaskiniNyawa() {
            let hStr = "";
            for (let i = 0; i < nyawa; i++) hStr += "❤️ ";
            if (nyawa === 0) hStr = "💔 " + teksUI[lang].gameOver;
            document.getElementById("hearts-layer").innerText = hStr ? hStr.trim() : "💔";
        }

        function mulaKuiz() {
            let inputNama = document.getElementById("username").value.trim();
            let namaFinal = inputNama ? inputNama : "CILIK";
            
            namaFinal = namaFinal.replace(/🤖/g, '').trim();
            localStorage.setItem('namaMurid', namaFinal);

            let elemenNama = document.getElementById('paparNama');
            elemenNama.innerHTML = `🔬 ${teksUI[lang].saintisLabel}: <span style="color:#1b5e20">${namaFinal.toUpperCase()}</span>`;
            elemenNama.style.display = "block";

            document.getElementById("main-screen").style.display = "none";
            document.getElementById("header-bar").style.display = "flex";
            document.getElementById("ui-btn-keluar").style.display = "none";
            
            kuizSoalan = bankSoalan.sort(() => 0.5 - Math.random()).slice(0, JUMLAH_SOALAN);
            
            soalanSekarang = 0;
            markah = 0;
            nyawa = 3;
            kemaskiniNyawa();
            paparSoalan();
        }

        function paparSoalan() {
            jawapanDipilih = null;
            renderSoalanSemula();
        }

        function renderSoalanSemula() {
            let quizArea = document.getElementById("quiz-area");
            let data = kuizSoalan[soalanSekarang];
            let ui = teksUI[lang];
            
            document.getElementById("progress-text").innerText = `${ui.soalan}: ${soalanSekarang + 1}/${JUMLAH_SOALAN}`;
            document.getElementById("score-text").innerText = `${ui.markah}: ${markah}`;
            
            quizArea.innerHTML = `
                <div class="question-text">${data.q[lang]}</div>
                <div id="options-container"></div>
                <div id="result-message"></div>
                <button class="action-btn" id="next-btn" style="display:none;" onclick="keSoalanSeterusnya()">${ui.seterusnya}</button>
            `;
            
            let container = document.getElementById("options-container");
            data.options[lang].forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                
                // Keep styles if already answered
                if (jawapanDipilih !== null) {
                    if (index === data.correct) {
                        btn.style.backgroundColor = "#c8e6c9";
                        btn.style.borderColor = "#4caf50";
                    } else if (index === jawapanDipilih && jawapanDipilih !== data.correct) {
                        btn.style.backgroundColor = "#ffcdd2";
                        btn.style.borderColor = "#f44336";
                    }
                } else {
                    btn.onclick = () => pilihJawapan(index, btn);
                }
                
                container.appendChild(btn);
            });

            // Restore message and next button if already answered
            if (jawapanDipilih !== null) {
                let msg = document.getElementById("result-message");
                if (jawapanDipilih === data.correct) {
                    msg.innerText = ui.betul;
                    msg.style.color = "#2e7d32";
                } else {
                    msg.innerText = ui.salah;
                    msg.style.color = "#c62828";
                }
                document.getElementById("next-btn").style.display = "block";
            }
        }

        function pilihJawapan(index, element) {
            if (jawapanDipilih !== null) return;
            
            jawapanDipilih = index;
            let data = kuizSoalan[soalanSekarang];
            let msg = document.getElementById("result-message");
            let buttons = document.querySelectorAll(".option-btn");
            let ui = teksUI[lang];
            
            if (index === data.correct) {
                element.style.backgroundColor = "#c8e6c9";
                element.style.borderColor = "#4caf50";
                msg.innerText = ui.betul;
                msg.style.color = "#2e7d32";
                markah += 5;
                document.getElementById("score-text").innerText = `${ui.markah}: ${markah}`;
            } else {
                element.style.backgroundColor = "#ffcdd2";
                element.style.borderColor = "#f44336";
                buttons[data.correct].style.backgroundColor = "#c8e6c9";
                buttons[data.correct].style.borderColor = "#4caf50";
                msg.innerText = ui.salah;
                msg.style.color = "#c62828";
                nyawa--;
                kemaskiniNyawa();
            }
            document.getElementById("next-btn").style.display = "block";
        }

        function keSoalanSeterusnya() {
            if (nyawa <= 0) {
                tamatKuiz(true);
                return;
            }
            
            soalanSekarang++;
            if (soalanSekarang < JUMLAH_SOALAN) {
                paparSoalan();
            } else {
                tamatKuiz(false);
            }
        }

        function tamatKuiz(isGameOver) {
            document.getElementById("header-bar").style.display = "none";
            let quizArea = document.getElementById("quiz-area");
            let ui = teksUI[lang];
            
            let totalMain = parseInt(localStorage.getItem('sains_kuiz2_total_main') || "0") + 1;
            let markahTertinggi = parseInt(localStorage.getItem('sains_kuiz2_high_score') || "0");
            if (markah > markahTertinggi) {
                localStorage.setItem('sains_kuiz2_high_score', markah);
            }
            localStorage.setItem('sains_kuiz2_total_main', totalMain);
            localStorage.setItem('sains_kuiz2_last_date', new Date().toLocaleDateString('ms-MY'));

            if (isGameOver) {
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">💥</span>
                        <h3 id="end-title" style="color:#c62828; margin:10px 0;">${ui.gameOver}</h3>
                        <p id="end-desc">${ui.nyawaHabis}</p>
                        <p style="font-size:1.1rem; font-weight:bold;"><span id="end-score-label">${ui.markahTerkumpul}</span>: <span style="color:#c62828;">${markah}</span></p>
                        <button onclick="location.reload()" class="action-btn">🔄 <span id="end-btn-text">${ui.cubaLagi}</span></button>
                    </div>
                `;
            } else {
                let piala = markah >= 80 ? "🏆" : "🥈";
                quizArea.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <span style="font-size:4rem;">${piala}</span>
                        <h3 id="end-title" style="color:#4caf50; margin:10px 0;">${ui.tahniah}</h3>
                        <p style="font-size:1.1rem; font-weight:bold;"><span id="end-score-label">${ui.markah}</span>:<br><span style="color:#4caf50; font-size:2.5rem;">💯 ${markah}/100</span></p>
                        <button onclick="location.reload()" class="action-btn">🔄 <span id="end-btn-text">${ui.mainLagi}</span></button>
                    </div>
                `;
            }
        }

        function paparSistemPrestasi() {
            let quizArea = document.getElementById("quiz-area");
            let ui = teksUI[lang];
            let namaAnak = localStorage.getItem('namaMurid') || "-";
            namaAnak = namaAnak.replace(/🤖/g, '').trim(); 
            let hScore = parseInt(localStorage.getItem('sains_kuiz2_high_score') || "0");
            let tMain = localStorage.getItem('sains_kuiz2_total_main') || "0";
            let lDate = localStorage.getItem('sains_kuiz2_last_date') || "-";
            
            let komenPrestasi = "";
            if (lang === 'ms') {
                if(hScore >= 80) komenPrestasi = "Hebat! Teruskan kecemerlangan! 🌟";
                else if(hScore >= 60) komenPrestasi = "Bagus! Sikit lagi nak capai 100! 👍";
                else if(hScore >= 40) komenPrestasi = "Boleh tahan! Mari perbaiki lagi! 👌";
                else komenPrestasi = "Jangan putus asa, teruskan usaha! 💪";
            } else {
                if(hScore >= 80) komenPrestasi = "Awesome! Keep up the excellent work! 🌟";
                else if(hScore >= 60) komenPrestasi = "Good job! Almost at 100! 👍";
                else if(hScore >= 40) komenPrestasi = "Not bad! Let's improve more! 👌";
                else komenPrestasi = "Don't give up, keep trying! 💪";
            }

            quizArea.innerHTML = `
                <div class="instruction-screen">
                    <div>
                        <span style="font-size: 3rem;">📊</span>
                        <h3 id="dash-title" style="color: #0288d1; margin: 5px 0;">${ui.dashTajuk}</h3>
                        <p id="dash-desc" style="font-size:0.85rem; color:#666; margin-bottom:10px;">${ui.dashDesc}</p>
                        
                        <div class="stats-card">
                            <div class="stats-line"><b id="dash-lbl-anak">${ui.lblAnak}</b> <span>${namaAnak.toUpperCase()}</span></div>
                            <div class="stats-line"><b id="dash-lbl-tertinggi">${ui.lblTertinggi}</b> <span style="color:#4caf50; font-weight:bold;">${hScore}/100</span></div>
                            
                            <div class="stats-line"><b id="dash-lbl-gred">${ui.lblGred}</b> <span id="dash-komen" style="color:#e65100; font-weight:bold; text-align:right; margin-left:10px;">${komenPrestasi}</span></div>
                            
                            <div class="stats-line"><b id="dash-lbl-latihan">${ui.lblLatihan}</b> <span>${tMain}</span></div>
                            <div class="stats-line"><b id="dash-lbl-ujian">${ui.lblUjian}</b> <span>${lDate}</span></div>
                        </div>
                    </div>
                    <button class="action-btn" style="background-color:#757575; box-shadow:0 5px 0 #424242;" onclick="location.reload()" id="dash-btn-kembali">${ui.btnKembali}</button>
                </div>
            `;
        }

        // Set bahasa awal semasa mula-mula buka page
        window.onload = function() {
            kemasKiniUI();
        };
    </script>
</body>
</html>
