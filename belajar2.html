<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sains Cilik Tahun 2</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #fff3e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            background: #ffe0b2;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            color: #e65100;
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            background: white;
            border: 3px solid #e0e0e0;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            box-sizing: border-box;
            text-align: left;
        }
        .action-btn {
            width: 100%;
            background: #ff9800;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-bar" id="header" style="display:none;">
            <span id="prog">Soalan: 1/20</span>
            <span id="score">Markah: 0</span>
        </div>

        <h2 style="color:#ff9800;">Sains Tahun 2 🏆</h2>
        
        <div id="box">
            <p>Sedia untuk mulakan cabaran 20 soalan rawak daripada bank 50 soalan?</p>
            <button class="action-btn" onclick="mula()">MULA SEKARANG 🚀</button>
        </div>
        
        <a href="tahun2.html" style="display:block; margin-top:20px; color:#757575; text-decoration:none; font-weight:bold;">⬅️ Keluar</a>
    </div>

    <script>
        const bank = [
            { q: "Antara berikut, yang manakah merupakan keperluan asas manusia?", o: ["Telefon pintar", "Makanan, air dan udara", "Mainan"], c: 1 },
            { q: "Mengapakah manusia memerlukan udara?", o: ["Untuk bernafas", "Untuk membesar", "Untuk berjalan"], c: 0 },
            { q: "Apakah yang berlaku kepada saiz badan kita apabila kita membesar?", o: ["Menjadi kecil", "Menjadi besar", "Tidak berubah"], c: 1 },
            { q: "Tumbesaran manusia melibatkan pertambahan saiz, berat dan...", o: ["Kepantasan", "Tinggi", "Warna baju"], c: 1 },
            { q: "Ciri-ciri fizikal seperti warna anak mata diwarisi daripada...", o: ["Guru", "Ibu bapa atau keturunan", "Kawan-kawan"], c: 1 },
            { q: "Haiwan manakah yang menyusukan anaknya?", o: ["Ayam", "Paus atau Kucing", "Katak"], c: 1 },
            { q: "Manakah antara haiwan berikut bertelur dengan banyak?", o: ["Tenggiling", "Katak atau Penyu", "Monyet"], c: 1 },
            { q: "Apakah keperluan asas bagi anak benih untuk bercambah?", o: ["Baja, tanah dan pasu", "Air, udara dan kehangatan", "Cahaya matahari sahaja"], c: 1 },
            { q: "Apakah sumber cahaya semula jadi yang utama pada waktu siang?", o: ["Mentol", "Lilin", "Matahari"], c: 2 },
            { q: "Bilakah bayang-bayang terbentuk?", o: ["Apabila cahaya dihalang oleh objek", "Apabila lampu ditutup", "Waktu malam sahaja"], c: 0 },
            { q: "Antara berikut, yang manakah komponen dalam set permainan elektrik?", o: ["Sel kering, mentol, suis", "Klip kertas, magnet", "Cermin, pembaris"], c: 0 },
            { q: "Apakah fungsi suis dalam litar elektrik?", o: ["Membekalkan tenaga", "Menyala", "Menyambung dan memutuskan litar"], c: 2 },
            { q: "Mengapakah mentol tidak menyala walaupun suis telah ditutup?", o: ["Bateri habis atau mentol rosak", "Wayar terlalu panjang", "Sebab hari siang"], c: 0 },
            { q: "Bahan yang membenarkan arus elektrik mengalir melaluinya dipanggil...", o: ["Penebat elektrik", "Konduktor elektrik", "Magnet"], c: 1 },
            { q: "Antara berikut, objek manakah ialah penebat elektrik?", o: ["Kunci besi", "Pemadam atau Pembaris plastik", "Syiling"], c: 1 },
            { q: "Apakah bahan utama untuk membuat botol plastik?", o: ["Kayu", "Plastik", "Pasir"], c: 1 },
            { q: "Antara berikut, yang manakah boleh larut di dalam air?", o: ["Garam atau Gula", "Batu batan", "Serbuk kayu"], c: 0 },
            { q: "Bagaimanakah cara untuk melarutkan gula dengan lebih cepat?", o: ["Gunakan air sejuk", "Menggunakan air panas dan dikacau", "Biar sahaja tanpa kacau"], c: 1 },
            { q: "Apakah komponen tanah yang mengandungi sisa tumbuhan dan haiwan mati?", o: ["Pasir", "Humus", "Batu"], c: 1 },
            { q: "Tanah manakah yang paling sesuai untuk menanam pokok padi?", o: ["Tanah pasir", "Tanah liat", "Tanah kebun"], c: 1 },
            { q: "Haiwan manakah yang menyerupai induknya sejak lahir?", o: ["Rama-rama", "Kucing", "Katak"], c: 1 },
            { q: "Apakah tabiat makan bagi seekor kambing?", o: ["Makan daging", "Makan tumbuhan", "Makan semua"], c: 1 },
            { q: "Antara berikut, yang manakah haiwan Omnivor?", o: ["Lembu", "Harimau", "Ayam atau Beruang"], c: 2 },
            { q: "Apakah deria yang tiada pada orang yang buta?", o: ["Pendengaran", "Penglihatan", "Bau"], c: 1 },
            { q: "Mengapakah aktiviti membaca di tempat gelap tidak digalakkan?", o: ["Boleh merosakkan mata", "Buku akan hilang", "Sebab mengantuk"], c: 0 },
            { q: "Apakah yang membekalkan tenaga elektrik dalam litar kuiz?", o: ["Suis", "Sel kering atau Bateri", "Mentol"], c: 1 },
            { q: "Objek manakah yang menghasilkan bayang-bayang paling jelas?", o: ["Cermin lutsinar", "Objek legap", "Plastik jernih"], c: 1 },
            { q: "Apakah contoh haiwan yang hidup di dalam tanah kebun?", o: ["Cacing tanah", "Ikan", "Burung"], c: 0 },
            { q: "Tanah pasir mengandungi banyak...", o: ["Humus", "Butir pasir dan batu kecil", "Tanah liat"], c: 1 },
            { q: "Apakah kepentingan cahaya kepada manusia?", o: ["Membantu kita melihat dalam gelap", "Untuk mendengar bunyi", "Untuk membuat makanan"], c: 0 },
            { q: "Ulat beluncas adalah peringkat anak bagi haiwan apa?", o: ["Katak", "Rama-rama", "Nyamuk"], c: 1 },
            { q: "Adakah pokok memerlukan cahaya matahari untuk membuat makanan?", o: ["Ya, betul", "Tidak perlu", "Hanya waktu malam"], c: 0 },
            { q: "Apakah fungsi utama daun pada tumbuhan?", o: ["Membuat makanan", "Menyerap air", "Menghasilkan biji benih"], c: 0 },
            { q: "Antara objek berikut, yang manakah sejenis konduktor elektrik?", o: ["Pemadam", "Klip kertas logam", "Pembaris kayu"], c: 1 },
            { q: "Apakah rasa air laut?", o: ["Manis", "Masin", "Masam"], c: 1 },
            { q: "Mengapakah kita perlu makan setiap hari?", o: ["Untuk mendapatkan tenaga", "Untuk jadi gemuk", "Sebab bosan"], c: 0 },
            { q: "Manakah antara berikut haiwan Karnivor?", o: ["Arnab", "Singa", "Biri-biri"], c: 1 },
            { q: "Anak katak yang hidup di dalam air dipanggil...", o: ["Beluncas", "Berudu", "Anak ayam"], c: 1 },
            { q: "Apakah yang akan terjadi kepada pokok jika tidak disiram air?", o: ["Makin subur", "Layu dan mati", "Bertukar warna biru"], c: 1 },
            { q: "Bahan manakah yang tidak boleh larut dalam air?", o: ["Gula", "Pasir", "Garam"], c: 1 },
            { q: "Apakah yang digunakan untuk menyambungkan komponen elektrik?", o: ["Benang", "Wayar penyambung", "Reben"], c: 1 },
            { q: "Suis terbuka menyebabkan mentol...", o: ["Menyala", "Tidak menyala", "Meletup"], c: 1 },
            { q: "Apakah objek yang diletakkan pada litar untuk menguji konduktor?", o: ["Syiling kuprum", "Tali leher", "Pensel kayu"], c: 0 },
            { q: "Manakah antara berikut merupakan sumber cahaya buatan manusia?", o: ["Bintang", "Lampu suluh atau Mentol", "Matahari"], c: 1 },
            { q: "Bayang-bayang menjadi lebih besar jika objek...", o: ["Dijauhkan dari lampu", "Dekat dengan sumber cahaya", "Dikecilkan"], c: 1 },
            { q: "Berudu bernafas menggunakan apa?", o: ["Peparu", "Insang", "Hidung"], c: 1 },
            { q: "Pokok bunga kebangsaan Malaysia ialah Pokok...", o: ["Matahari", "Bunga Raya", "Ros"], c: 1 },
            { q: "Haiwan manakah yang menjaga anaknya di dalam poket perut?", o: ["Kanggaru", "Monyet", "Anjing"], c: 0 },
            { q: "Apakah bau bangkai haiwan?", o: ["Wangi", "Busuk", "Manis"], c: 1 },
            { q: "Tanah liat mempunyai tekstur yang...", o: ["Kasar", "Halus dan melekit", "Berpasir"], c: 1 }
        ];

        let kuizSoalan = [];
        let idx = 0;
        let markah = 0;

        function mula() {
            document.getElementById("header").style.display = "flex";
            // Ambil 20 soalan secara rawak daripada 50 soalan
            kuizSoalan = bank.sort(() => 0.5 - Math.random()).slice(0, 20);
            idx = 0;
            markah = 0;
            papar();
        }

        function papar() {
            let data = kuizSoalan[idx];
            document.getElementById("prog").innerText = "Soalan: " + (idx + 1) + "/20";
            
            let html = `<p style="font-weight:bold; font-size:1.1rem; text-align:left;">${data.q}</p>`;
            data.o.forEach((pilihan, i) => {
                html += `<button class="btn" onclick="pilih(${i})">${pilihan}</button>`;
            });
            
            document.getElementById("box").innerHTML = html;
        }

        function pilih(i) {
            let data = kuizSoalan[idx];
            if(i === data.c) {
                markah += 5;
                document.getElementById("score").innerText = "Markah: " + markah;
                alert("🎉 BETUL!");
            } else {
                alert("❌ SALAH!");
            }
            
            idx++;
            if(idx < 20) {
                papar();
            } else {
                document.getElementById("header").style.display = "none";
                document.getElementById("box").innerHTML = `
                    <h3>Tahniah! Kuiz Selesai</h3>
                    <p style="font-size:1.5rem; font-weight:bold; color:#4caf50;">Markah Anda: ${markah}/100</p>
                    <button class="action-btn" onclick="mula()">MAIN LAGI 🔄</button>
                `;
            }
        }
    </script>
</body>
</html>
