<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sains Cilik - Kuasai Sains dengan Ceria!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #fff9c4);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Bekas Utama: Di phone dia ikut saiz phone, di PC dia melebar automatik! */
        .container-box {
            width: 100%;
            max-width: 900px; /* Lebar maksimum dinaikkan supaya gempak di PC */
            background: white;
            padding: 40px 30px;
            box-sizing: border-box;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-animated {
            font-size: 5rem;
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        h1 { 
            color: #0288d1; 
            font-size: 2.8rem; 
            margin: 10px 0 2px 0; 
            text-align: center;
            text-shadow: 2px 2px 0px #e0f2f1;
            font-weight: 900;
        }

        .subtitle { 
            color: #ff9800; 
            font-weight: bold; 
            font-size: 1.3rem; 
            margin-bottom: 40px; 
            text-align: center;
        }

        /* SUSUNAN GRID UTAMA (Standard PC: 3 Lajur Melintang) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 Kotak Sebaris di PC */
            gap: 20px;
            width: 100%;
            margin-bottom: 25px;
        }

        .grid-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 15px;
            font-family: 'Comic Sans MS', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s ease;
            text-decoration: none;
            text-align: center;
        }

        .grid-btn span {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* WARNA PREMIUM & BAYANG 3D */
        .btn-t1 { background-color: #ff5252; box-shadow: 0 8px 0 #c62828; }
        .btn-t2 { background-color: #ff9800; box-shadow: 0 8px 0 #ef6c00; }
        .btn-t3 { background-color: #fbc02d; box-shadow: 0 8px 0 #f57f17; }
        .btn-t4 { background-color: #4caf50; box-shadow: 0 8px 0 #2e7d32; }
        .btn-t5 { background-color: #2196f3; box-shadow: 0 8px 0 #1565c0; }
        .btn-t6 { background-color: #9c27b0; box-shadow: 0 8px 0 #6a1b9a; }

        .grid-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 inherit;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.95rem;
            color: #999;
            font-weight: bold;
        }

        /* 📱 MAGIS RESPONSIVE: Jika skrin kecil (Phone), tukar jadi 2 lajur automatik! */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr); /* Tukar jadi 2 kotak sebaris */
                gap: 15px;
            }
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1.1rem; }
            .grid-btn { font-size: 1.1rem; padding: 20px 10px; }
            .grid-btn span { font-size: 2.3rem; }
        }
    </style>
</head>
<body>

    <div class="container-box">
        <div class="header-animated">🔬🚀</div>
        <h1>Sains Cilik</h1>
        <div class="subtitle">Belajar Sains Jadi Seronok! 🎉</div>
        
        <!-- GRID IKUT SAIZ SKRIN -->
        <div class="grid-container">
            <button class="grid-btn btn-t1" onclick="location.href='tahun1.html'">
                <span>🎮</span>TAHUN 1
            </button>
            <button class="grid-btn btn-t2" onclick="location.href='tahun2.html'">
                <span>🏆</span>TAHUN 2
            </button>
            <button class="grid-btn btn-t3" onclick="location.href='tahun3.html'">
                <span>⚡</span>TAHUN 3
            </button>
            <button class="grid-btn btn-t4" onclick="location.href='tahun4.html'">
                <span>📖</span>TAHUN 4
            </button>
            <button class="grid-btn btn-t5" onclick="location.href='tahun5.html'">
                <span>🧠</span>TAHUN 5
            </button>
            <button class="grid-btn btn-t6" onclick="location.href='tahun6.html'">
                <span>🏅</span>TAHUN 6
            </button>
        </div>

        <div class="footer">
            © 2026 Sains Cilik • KSSR Malaysia
        </div>
    </div>

</body>
</html>
