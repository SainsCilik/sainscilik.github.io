<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sains Cilik Tahun 2 - Daftar Profil Gempak</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #ffd54f, #ffcc80);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container-box {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 40px 30px;
            box-sizing: border-box;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-area {
            font-size: 5rem;
            margin-top: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h2 { 
            color: #e65100; 
            font-size: 2rem; 
            margin: 15px 0 5px 0; 
            text-align: center;
            text-shadow: 1px 1px 0px #fff3e0;
            font-weight: 900;
        }

        p { color: #666; text-align: center; font-size: 1rem; margin-bottom: 25px; }
        
        .avatar-label {
            font-weight: bold;
            color: #e65100;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            margin-bottom: 25px;
        }

        .avatar-box {
            font-size: 2.3rem;
            background: #f5f5f5;
            border: 3px solid #e0e0e0;
            padding: 12px 5px;
            border-radius: 18px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #e0e0e0;
        }

        .avatar-box:hover { transform: scale(1.05); }

        .avatar-box.selected {
            background: #fff3e0;
            border-color: #ff9800;
            box-shadow: 0 5px 0 #e65100;
            transform: scale(1.1);
        }

        .input-container {
            width: 100%;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #e65100;
            margin-bottom: 8px;
            font-size: 1.05rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 3px solid #ffcc80;
            border-radius: 15px;
            font-size: 1.2rem;
            text-align: center;
            font-family: 'Comic Sans MS', sans-serif;
            box-sizing: border-box;
            background-color: #fafafa;
            color: #333;
        }

        input[type="text"]:focus {
            border-color: #ff9800;
            outline: none;
            background-color: #fff;
        }

        .save-btn {
            width: 100%;
            background: linear-gradient(to bottom, #ff9800, #f57c00);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 6px 0 #b35c00;
            cursor: pointer;
            transition: 0.1s;
        }

        .save-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b35c00;
        }

        .back-link {
            margin-top: 20px;
            color: #757575;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
        }
        
        .back-link:hover { color: #333; }
    </style>
</head>
<body>

    <div class="container-box">
        <div class="logo-area" id="avatar-pantulan">🏆</div>
        <h2>Profil Sains Tahun 2</h2>
        <p>Sedia untuk cabaran baru? Pilih avatar & isi nama anda!</p>

        <!-- PILIHAN AVATAR UNTUK TAHUN 2 -->
        <div class="avatar-label">🎯 Pilih Avatar Anda:</div>
        <div class="avatar-grid">
            <div class="avatar-box selected" onclick="pilihAvatar('🏆', this)">🏆</div>
            <div class="avatar-box" onclick="pilihAvatar('🦖', this)">🦖</div>
            <div class="avatar-box" onclick="pilihAvatar('👽', this)">👽</div>
            <div class="avatar-box" onclick="pilihAvatar('🚀', this)">🚀</div>
            <div class="avatar-box" onclick="pilihAvatar('🦠', this)">🦠</div>
            <div class="avatar-box" onclick="pilihAvatar('🐵', this)">🐵</div>
            <div class="avatar-box" onclick="pilihAvatar('🦉', this)">🦉</div>
            <div class="avatar-box" onclick="pilihAvatar('💡', this)">💡</div>
        </div>
        
        <!-- KOTAK INPUT NAMA -->
        <div class="input-container">
            <label for="student-name">✍️ Nama Anda :</label>
            <input type="text" id="student-name" placeholder="TAIP NAMA DI SINI..." required>
        </div>

        <!-- BUTANG MULA (Nanti kita halakan ke belajar2.html) -->
        <button class="save-btn" onclick="simpanProfilT2()">SIMPAN & MULA 🚀</button>

        <a href="index.html" class="back-link">⬅️ Kembali ke Utama</a>
    </div>

    <script>
        let avatarDipilih = "🏆";

        function pilihAvatar(emoji, elemen) {
            document.querySelectorAll('.avatar-box').forEach(box => {
                box.classList.remove('selected');
            });
            elemen.classList.add('selected');
            avatarDipilih = emoji;
            document.getElementById('avatar-pantulan').innerText = emoji;
        }

        function simpanProfilT2() {
            let nama = document.getElementById('student-name').value.trim();
            
            if(nama === "") {
                alert("Sila tulis nama anda dahulu ya! 😊");
                return;
            }
            
            let namaLengkap = avatarDipilih + " " + nama;
            localStorage.setItem('namaMurid', namaLengkap);
            
            // Halakan ke fail kuiz tahun 2 (belajar2.html)
            window.location.href = "belajar2.html";
        }
    </script>
</body>
</html>
